<!DOCTYPE html>
<html>
<head>
    <title>Birthday Magic Card</title>
    <style>
        @media print {
            @page { size: 5in 7in; margin: 0; }
            body { margin: 0; -webkit-print-color-adjust: exact; }
        }
        body {
            margin: 0;
            padding: 0;
            width: 5in;
            height: 7in;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #FF6B6B;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            width: 4.5in;
            height: 6.5in;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .balloons {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 40px;
        }
        .title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #FF6B6B;
            margin-top: 80px;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .qr-area {
            width: 2in;
            height: 2in;
            background: #f8f8f8;
            border: 2px dashed #FF6B6B;
            border-radius: 10px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
            text-align: center;
            padding: 10px;
        }
        .instructions {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }
        .magic-badge {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: #FFD700;
            color: #333;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: bold;
        }
        .ar-hint {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 10px;
            text-align: center;
            width: 1.5in;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="balloons">🎈🎈🎈</div>
        <div class="ar-hint">📱 Point camera here for AR magic!</div>
        
        <div class="title">HAPPY BIRTHDAY!</div>
        <div class="subtitle">Make a wish come true with magic</div>
        
        <div class="qr-area">
            [QR CODE AREA]<br><br>
            Scan → Record → Send<br>
            Birthday Magic!
        </div>
        
        <div class="instructions">
            <strong>HOW IT WORKS:</strong><br>
            1. Sender scans QR code<br>
            2. Records birthday message<br>
            3. Gives this card to recipient<br>
            4. Recipient scans to see magic!
        </div>
        
        <div class="magic-badge">✨ MAGIC CARD ✨</div>
    </div>
    
    <script>
        setTimeout(() => {
            alert("🎂 BIRTHDAY CARD READY TO PRINT!\n\nPrint Settings:\n• Paper: 5x7 inches\n• Quality: Best\n• Margins: None\n• Cardstock recommended");
            window.print();
        }, 1000);
    </script>
</body>
</html>
