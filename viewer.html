<!-- Loading Screen -->
<div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loadingText">Preparing QR Scanner...</div>
</div>

<!-- Main Container -->
<div class="container">
    <!-- Scanner Section -->
    <div class="scanner-section">
        <h2 class="scanner-title">Scan QR Code</h2>
        <p class="scanner-description">Point your camera at a QR code from your Magic Card</p>
        
        <div class="qr-scanner">
            <div id="scanner-container">
                <video id="scanner-video" autoplay playsinline></video>
                <div class="scanner-overlay">
                    <div class="scanner-frame"></div>
                    <div style="margin-top: 20px; color: #60a5fa; font-weight: 600;">
                        Position QR code inside frame
                    </div>
                </div>
            </div>
            
            <div class="scanner-controls">
                <button class="scanner-btn" id="startScannerBtn">
                    <i class="fas fa-camera"></i> Start Scanner
                </button>
                <button class="scanner-btn stop" id="stopScannerBtn" style="display: none;">
                    <i class="fas fa-stop"></i> Stop Scanner
                </button>
            </div>
        </div>
    </div>
    
    <!-- Manual Input -->
    <div class="manual-input">
        <h3><i class="fas fa-keyboard"></i> Or Enter Card ID Manually</h3>
        <div class="input-group">
            <input type="text" id="cardIdInput" placeholder="Enter Card ID (e.g., CARD1234)">
            <button id="loadCardBtn">
                <i class="fas fa-search"></i> Load Card
            </button>
        </div>
    </div>
    
    <!-- Card Display -->
    <div class="card-display" id="cardDisplay">
        <div class="card-header">
            <div class="card-title">
                <i class="fas fa-gem"></i>
                <span>Magic Card</span>
                <span class="card-id" id="displayCardId">CARD1234</span>
            </div>
        </div>
        
        <div class="card-content">
            <div class="card-message" id="displayMessage">
                Your message will appear here...
            </div>
        </div>
        
        <div class="card-meta">
            <div class="meta-item">
                <i class="fas fa-tag"></i>
                <div>
                    <div class="meta-label">Type</div>
                    <div class="meta-value" id="displayType">Text Message</div>
                </div>
            </div>
            <div class="meta-item">
                <i class="fas fa-calendar"></i>
                <div>
                    <div class="meta-label">Created</div>
                    <div class="meta-value" id="displayDate">Just now</div>
                </div>
            </div>
            <div class="meta-item">
                <i class="fas fa-database"></i>
                <div>
                    <div class="meta-label">Source</div>
                    <div class="meta-value" id="displaySource">Supabase Database</div>
                </div>
            </div>
        </div>
        
        <div class="card-actions">
            <button class="card-btn primary" id="shareBtn">
                <i class="fas fa-share-alt"></i> Share Card
            </button>
            <button class="card-btn secondary" id="qrBtn">
                <i class="fas fa-qrcode"></i> Generate QR
            </button>
        </div>
        
        <button class="back-btn" id="backBtn">
            <i class="fas fa-redo"></i> Scan Another Code
        </button>
    </div>
</div>

<!-- Alert -->
<div class="alert" id="alert"></div>

<script>
    // === SUPABASE CREDENTIALS ===
    const SUPABASE_URL = 'https://elmhkhvryjzljxskbfps.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsbWhraHZyeWp6bGp4c2tiZnBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0NDc3NjMsImV4cCI6MjA4NDAyMzc2M30.Orrh2Pejnt3KPJMTUTmRRkhCwtZVfjUreKvX546bOcw';
    // ==============================
    
    // Initialize Supabase
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    document.addEventListener('DOMContentLoaded', function() {
        // DOM Elements
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const startScannerBtn = document.getElementById('startScannerBtn');
        const stopScannerBtn = document.getElementById('stopScannerBtn');
        const scannerVideo = document.getElementById('scanner-video');
        const cardIdInput = document.getElementById('cardIdInput');
        const loadCardBtn = document.getElementById('loadCardBtn');
        const cardDisplay = document.getElementById('cardDisplay');
        const displayCardId = document.getElementById('displayCardId');
        const displayMessage = document.getElementById('displayMessage');
        const displayType = document.getElementById('displayType');
        const displayDate = document.getElementById('displayDate');
        const displaySource = document.getElementById('displaySource');
        const shareBtn = document.getElementById('shareBtn');
        const qrBtn = document.getElementById('qrBtn');
        const backBtn = document.getElementById('backBtn');
        const alert = document.getElementById('alert');
        
        // State
        let currentStream = null;
        let isScanning = false;
        let currentCard = null;
        
        // Show alert
        function showAlert(message, type = 'info') {
            alert.textContent = message;
            alert.className = `alert ${type} show`;
            
            setTimeout(() => {
                alert.classList.remove('show');
            }, 3000);
        }
        
        // Update status
        function updateStatus(connected, message) {
            statusDot.className = connected ? 'status-dot connected' : 'status-dot';
            statusText.textContent = message;
        }
        
        // Test Supabase connection
        async function testConnection() {
            try {
                const { data, error } = await supabase
                    .from('cards')
                    .select('count', { count: 'exact', head: true });
                
                if (error) throw error;
                
                updateStatus(true, 'Connected');
                showAlert('Connected to database', 'success');
                return true;
            } catch (error) {
                console.error('Database connection failed:', error);
                updateStatus(false, 'Offline Mode');
                showAlert('Using offline mode', 'error');
                return false;
            }
        }
        
        // Load card from Supabase
        async function loadCard(cardId) {
            if (!cardId) {
                showAlert('Please enter a Card ID', 'error');
                return null;
            }
            
            // Ensure CARD prefix
            if (!cardId.toUpperCase().startsWith('CARD')) {
                cardId = 'CARD' + cardId;
            }
            
            showAlert(`Loading card ${cardId}...`, 'info');
            
            try {
                const { data: card, error } = await supabase
                    .from('cards')
                    .select('*')
                    .eq('card_id', cardId)
                    .single();
                
                if (error) {
                    if (error.code === 'PGRST116') {
                        showAlert(`Card ${cardId} not found`, 'error');
                    } else {
                        showAlert(`Error: ${error.message}`, 'error');
                    }
                    return null;
                }
                
                if (!card) {
                    showAlert(`Card ${cardId} not found`, 'error');
                    return null;
                }
                
                console.log('Card loaded:', card);
                return card;
                
            } catch (error) {
                console.error('Load card error:', error);
                showAlert('Failed to load card', 'error');
                return null;
            }
        }
        
        // Display card
        function displayCard(card) {
            currentCard = card;
            
            // Stop scanner
            stopScanner();
            
            // Update display
            displayCardId.textContent = card.card_id;
            displayMessage.textContent = card.message_text || 'No message available';
            displayType.textContent = card.message_type || 'Text Message';
            
            if (card.created_at) {
                const date = new Date(card.created_at);
                displayDate.textContent = date.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } else {
                displayDate.textContent = 'Unknown';
            }
            
            // Show card display
            cardDisplay.classList.add('show');
            showAlert(`Card ${card.card_id} loaded!`, 'success');
        }
        
        // Start QR scanner
        async function startScanner() {
            if (isScanning) return;
            
            try {
                // Request camera access
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                currentStream = stream;
                scannerVideo.srcObject = stream;
                
                startScannerBtn.style.display = 'none';
                stopScannerBtn.style.display = 'flex';
                
                // Start scanning for QR codes
                scanQRCode();
                
                isScanning = true;
                showAlert('Scanner started. Point at QR code.', 'success');
                
            } catch (error) {
                console.error('Camera error:', error);
                if (error.name === 'NotAllowedError') {
                    showAlert('Camera access denied. Please allow camera access.', 'error');
                } else if (error.name === 'NotFoundError') {
                    showAlert('No camera found on this device.', 'error');
                } else {
                    showAlert(`Camera error: ${error.message}`, 'error');
                }
            }
        }
        
        // Stop QR scanner
        function stopScanner() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            
            scannerVideo.srcObject = null;
            startScannerBtn.style.display = 'flex';
            stopScannerBtn.style.display = 'none';
            
            isScanning = false;
        }
        
        // Scan for QR codes
        async function scanQRCode() {
            if (!isScanning) return;
            
            try {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                // Set canvas dimensions to video dimensions
                canvas.width = scannerVideo.videoWidth;
                canvas.height = scannerVideo.videoHeight;
                
                // Draw video frame to canvas
                context.drawImage(scannerVideo, 0, 0, canvas.width, canvas.height);
                
                // Get image data
                const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                
                // Try to decode QR code using jsQR
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: 'dontInvert',
                });
                
                if (code) {
                    console.log('QR Code detected:', code.data);
                    
                    // Extract card ID from QR code data
                    let cardId = code.data;
                    
                    // If it's a URL, extract the card parameter
                    if (code.data.includes('?card=')) {
                        try {
                            const url = new URL(code.data);
                            cardId = url.searchParams.get('card');
                        } catch (e) {
                            // Not a valid URL, use as-is
                        }
                    }
                    
                    if (cardId) {
                        // Stop scanner
                        stopScanner();
                        
                        // Load the card
                        const card = await loadCard(cardId);
                        if (card) {
                            displayCard(card);
                        } else {
                            // Restart scanner if card not found
                            setTimeout(startScanner, 2000);
                        }
                        return;
                    }
                }
                
                // Continue scanning
                requestAnimationFrame(scanQRCode);
                
            } catch (error) {
                console.error('Scan error:', error);
                // Continue scanning
                if (isScanning) {
                    requestAnimationFrame(scanQRCode);
                }
            }
        }
        
        // Share card
        function shareCard() {
            if (!currentCard) {
                showAlert('No card to share', 'error');
                return;
            }
            
            const cardUrl = `${window.location.origin}${window.location.pathname}?card=${currentCard.card_id}`;
            const shareText = `Magic Card: ${currentCard.card_id}\n\n${currentCard.message_text}\n\nView at: ${cardUrl}`;
            
            if (navigator.share) {
                navigator.share({
                    title: `Magic Card: ${currentCard.card_id}`,
                    text: shareText,
                    url: cardUrl
                });
            } else {
                navigator.clipboard.writeText(shareText)
                    .then(() => showAlert('Card details copied!', 'success'))
                    .catch(() => {
                        // Fallback
                        const textArea = document.createElement('textarea');
                        textArea.value = shareText;
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                        showAlert('Card details copied!', 'success');
                    });
            }
        }
        
        // Generate QR for current card
        function generateQR() {
            if (!currentCard) {
                showAlert('No card to generate QR for', 'error');
                return;
            }
            
            window.open(`qr.html?card=${currentCard.card_id}`, '_blank');
        }
        
        // Back to scanner
        function backToScanner() {
            cardDisplay.classList.remove('show');
            currentCard = null;
            startScanner();
        }
        
        // Check URL for card parameter
        async function checkUrlForCard() {
            const params = new URLSearchParams(window.location.search);
            const cardId = params.get('card');
            
            if (cardId) {
                loadingText.textContent = `Loading card ${cardId}...`;
                const card = await loadCard(cardId);
                if (card) {
                    displayCard(card);
                    loading.classList.add('hidden');
                } else {
                    loading.classList.add('hidden');
                    showAlert('Card not found. Try scanning QR code.', 'error');
                }
            } else {
                loading.classList.add('hidden');
            }
        }
        
        // Event Listeners
        startScannerBtn.addEventListener('click', startScanner);
        stopScannerBtn.addEventListener('click', stopScanner);
        
        loadCardBtn.addEventListener('click', async () => {
            const cardId = cardIdInput.value.trim();
            if (cardId) {
                const card = await loadCard(cardId);
                if (card) {
                    displayCard(card);
                }
            }
        });
        
        cardIdInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const cardId = cardIdInput.value.trim();
                if (cardId) {
                    const card = await loadCard(cardId);
                    if (card) {
                        displayCard(card);
                    }
                }
            }
        });
        
        shareBtn.addEventListener('click', shareCard);
        qrBtn.addEventListener('click', generateQR);
        backBtn.addEventListener('click', backToScanner);
        
        // Initialize
        async function initialize() {
            // Test database connection
            await testConnection();
            
            // Check URL for card parameter
            await checkUrlForCard();
            
            // Auto-start scanner if no card in URL
            if (!currentCard) {
                startScanner();
            }
        }
        
        initialize();
    });
</script>
