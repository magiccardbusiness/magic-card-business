        // ADDED YOUR QRCodeGenerator CLASS HERE
        // Simple QR Code Generator
        class QRCodeGenerator {
            constructor() {
                this.canvas = document.getElementById('qrCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.size = 250;
            }
            
            generate(text) {
                // Clear canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Set white background
                this.ctx.fillStyle = '#ffffff';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                try {
                    // Generate QR code using the QRCode library
                    QRCode.toCanvas(this.canvas, text, {
                        width: this.size,
                        margin: 2,
                        color: {
                            dark: '#000000',
                            light: '#FFFFFF'
                        }
                    }, function(error) {
                        if (error) {
                            console.error('QR Code generation error:', error);
                            throw error;
                        }
                    });
                    return true;
                } catch (error) {
                    console.error('QR generation error:', error);
                    return false;
                }
            }
            
            changeColor(color) {
                if (!this.canvas || this.canvas.style.display !== 'block') return;
                
                // Save current QR code image data
                const imageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
                const data = imageData.data;
                
                // Convert color
                const rgb = this.hexToRgb(color);
                
                for (let i = 0; i < data.length; i += 4) {
                    // If pixel is black (or nearly black), change to new color
                    if (data[i] < 50 && data[i + 1] < 50 && data[i + 2] < 50) {
                        data[i] = rgb.r;
                        data[i + 1] = rgb.g;
                        data[i + 2] = rgb.b;
                    }
                }
                
                this.ctx.putImageData(imageData, 0, 0);
            }
            
            hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 0, g: 0, b: 0 };
            }
            
            download(filename = 'qrcode.png') {
                const link = document.createElement('a');
                link.download = filename;
                link.href = this.canvas.toDataURL('image/png');
                link.click();
            }
            
            getDataURL() {
                return this.canvas.toDataURL('image/png');
            }
        }
        
        // Main application - YOUR EXISTING CODE CONTINUES FROM HERE

            const qrLabel = document.getElementById('qrLabel');

            const qrDesc = document.getElementById('qrDesc');
            const downloadPngBtn = document.getElementById('downloadPng');

            console.log('DOM elements loaded:', {

            // State
            let currentQrColor = '#000000';

            let loadedCards = [];

            let isSupabaseConnected = false;
            
            // Show notification
            function showNotification(message, type = 'info') {
                if (!notification) {
                    console.error('Notification element not found');
                    return;
                }
                notification.textContent = message;
                notification.className = `notification ${type}`;
                notification.classList.add('show');
                
                setTimeout(() => {

            }
            
            // Update sync status
            function updateSyncStatus(connected) {
                if (!syncStatus) {
                    console.error('syncStatus element not found');
                    return;
                }
                
                if (connected) {
                    syncStatus.className = 'sync-status online';
                    syncStatus.innerHTML = '<i class="fas fa-cloud"></i><span>Connected to Supabase</span>';

                    syncStatus.className = 'sync-status offline';

            // Initialize Supabase client AFTER DOM is loaded
            function initializeSupabase() {
                try {
                    if (window.supabase && window.supabase.createClient) {
                        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                    return false;
                }
            }
            
            // Load cards from Supabase (using your exact table structure)
            async function loadCardsFromSupabase() {
                if (!isSupabaseConnected || !supabase) {
                    if (cardSelect) {
                        cardSelect.innerHTML = '<option value="">Supabase not connected</option>';
                    }
                    showNotification('Cannot connect to Supabase. Working in offline mode.', 'error');
                    return;
                }
                
                try {
                    // Load from your 'cards' table with exact column names
                    const { data: cards, error } = await supabase
                        .from('cards')
                        .select('card_id, message_type, message_text, media_url, file_name, created_at, status')
                        .eq('status', 'active') // Only load active cards
                        .order('created_at', { ascending: false })
                        .limit(50);
                    
                    if (error) {
                        console.error('Supabase error:', error);
                        
                        // Check if it's a "table doesn't exist" error
                        if (error.message.includes('does not exist')) {
                            if (cardSelect) {
                                cardSelect.innerHTML = '<option value="">No cards table found</option>';
                            }
                            showNotification('Cards table not found in Supabase. Create cards first in the Maker.', 'error');
                        } else {
                            if (cardSelect) {
                                cardSelect.innerHTML = '<option value="">Error loading cards</option>';
                            }
                            showNotification('Error loading cards: ' + error.message, 'error');
                        }
                        return;
                    }
                    
                    if (cards && cards.length > 0) {
                        if (cardSelect) {
                            cardSelect.innerHTML = '<option value="">Select a card from Supabase</option>';
                        }
                        loadedCards = cards;
                        
                        cards.forEach(card => {
                            if (cardSelect) {
                                const option = document.createElement('option');
                                option.value = card.card_id;
                                
                                // Create a descriptive label
                                let label = card.card_id;
                                if (card.message_text) {
                                    label += ` - ${card.message_text.substring(0, 25)}`;
                                    if (card.message_text.length > 25) label += '...';
                                } else if (card.message_type) {
                                    label += ` - ${card.message_type}`;
                                }
                                
                                option.textContent = label;
                                option.title = card.message_text || card.message_type || 'No message';
                                cardSelect.appendChild(option);
                            }

                        showNotification(`Loaded ${cards.length} cards from Supabase`, 'success');
                    } else {
                        if (cardSelect) {
                            cardSelect.innerHTML = '<option value="">No cards found in Supabase</option>';
                        }
                        showNotification('No cards found. Create cards first in the Maker.', 'info');
                    }
                } catch (error) {
                    console.error('Error loading cards:', error);
                    if (cardSelect) {
                        cardSelect.innerHTML = '<option value="">Error loading cards</option>';
                    }
                    showNotification('Error loading cards: ' + error.message, 'error');
                }
            }
            
            // After generating QR code, save to Supabase qr_codes table
            async function saveToSupabase(cardId, qrData, qrImageUrl) {
                if (!isSupabaseConnected || !supabase) {
                    console.log('Supabase not connected, skipping save');
                    return;
                }
                
                try {
                    const { data, error } = await supabase
                        .from('qr_codes')
                        .insert([
                            { 
                                card_id: cardId,
                                qr_data: qrData,

                                qr_type: document.querySelector('input[name="qrType"]:checked').value,
                                color: currentQrColor,
                                created_at: new Date().toISOString()
                            }
                        ]);
                    
                    if (error) {
                        console.error('Supabase save error:', error);
                        
                        // Check if table doesn't exist
                        if (error.message.includes('does not exist')) {
                            showNotification('QR codes table not found. Please create it in Supabase.', 'error');
                        } else {
                            showNotification('Could not save to Supabase: ' + error.message, 'error');
                        }
                    } else {
                        console.log('Saved to Supabase qr_codes table:', data);
                        showNotification('QR code saved to Supabase database', 'success');
                    }
                } catch (error) {
                    console.error('Error saving to Supabase:', error);
                    showNotification('Error saving to Supabase: ' + error.message, 'error');
                }
            }
            
            // Get card details from loaded cards
            function getCardDetails(cardId) {
                const card = loadedCards.find(c => c.card_id === cardId);
                if (card) {
                    return {

                                <label for="wifiPassword" style="margin-top: 15px;">Wi-Fi Password:</label>
                                <input type="text" id="wifiPassword" placeholder="Password123" value="Password123">
                                
                                <label for="wifiType" style="margin-top: 15px;">Security Type:</label>

            // Get QR data based on type

                            cardId = 'CARD' + cardId;
                        }
                        
                        // Create URL for AR viewer
                        const baseUrl = window.location.origin;
                        const viewerPath = window.location.pathname.includes('qr.html') 
                            ? window.location.pathname.replace('qr.html', 'viewer.html')

                        data = `${baseUrl}${viewerPath}?card=${encodeURIComponent(cardId)}`;
                        label = cardId;

                        const cardDetails = getCardDetails(cardId);

                        data = urlInput.value.trim();

                        if (!data) {
                            showNotification('Please enter a URL', 'error');
                            return null;
                        }
                        
                        if (!data.startsWith('http://') && !data.startsWith('https://')) {
                            data = 'https://' + data;
                        }
                        
                        label = 'Website QR Code';
                        description = 'Scan to open website.';
                        break;
                        
                    case 'text':
                        const textInput = document.getElementById('textInput');
                        if (!textInput) {
                            showNotification('Text input not found', 'error');
                            return null;
                        }
                        
                        data = textInput.value.trim();
                        cardId = 'TEXT_' + Date.now();
                        
                        if (!data) {
                            showNotification('Please enter text', 'error');
                            return null;
                        }
                        
                        label = 'Text QR Code';
                        description = 'Scan to view text.';
                        break;
                        
                    case 'wifi':
                        const wifiSsid = document.getElementById('wifiSsid');
                        const wifiPassword = document.getElementById('wifiPassword');
                        const wifiTypeSelect = document.getElementById('wifiType');
                        
                        if (!wifiSsid || !wifiPassword || !wifiTypeSelect) {
                            showNotification('Wi-Fi inputs not found', 'error');
                            return null;
                        }
                        
                        const ssid = wifiSsid.value.trim();
                        const password = wifiPassword.value.trim();
                        const type = wifiTypeSelect.value;
                        cardId = 'WIFI_' + ssid;
                        
                        if (!ssid) {
                            showNotification('Please enter Wi-Fi network name', 'error');
                            return null;
                        }
                        
                        data = `WIFI:S:${ssid};T:${type};P:${password};;`;
                        label = `Wi-Fi: ${ssid}`;
                        description = 'Scan to connect to Wi-Fi network.';
                        break;
                }
                
                return { data, label, type: qrType, description, cardId };
            }
            
            // Generate QR code - NOW USING YOUR QRCodeGenerator CLASS
            async function generateQR() {
                const qrData = getQrData();
                if (!qrData) return;
                
                currentQrData = qrData;
                
                // Show loading
                if (generateBtn) {
                    const originalText = generateBtn.innerHTML;
                    generateBtn.innerHTML = '<div class="loading"></div> Generating...';
                    generateBtn.disabled = true;
                }
                
                try {
                    // Generate QR code using YOUR QRCodeGenerator class
                    const qrGenerator = new QRCodeGenerator();
                    const success = qrGenerator.generate(qrData.data);
                    
                    if (success) {
                        // Change color
                        qrGenerator.changeColor(currentQrColor);
                        
                        // Show QR code
                        if (qrCanvas) qrCanvas.style.display = 'block';
                        if (emptyQr) emptyQr.style.display = 'none';
                        
                        // Update info
                        if (qrLabel) qrLabel.textContent = qrData.label;
                        if (qrType) qrType.textContent = qrData.type.charAt(0).toUpperCase() + qrData.type.slice(1);
                        if (qrDesc) qrDesc.textContent = qrData.description;
                        if (qrInfo) qrInfo.style.display = 'block';
                        
                        // Save to local storage for recent list
                        addToRecentQrCodes(qrData, qrGenerator);
                        
                        // Save to Supabase if connected
                        if (isSupabaseConnected) {
                            const qrImageUrl = qrGenerator.getDataURL();
                            await saveToSupabase(qrData.cardId, qrData.data, qrImageUrl);
                        }
                        
                        showNotification('QR code generated successfully!', 'success');
                    } else {
                        showNotification('Failed to generate QR code', 'error');
                    }
                } catch (error) {
                    console.error('QR generation error:', error);
                    showNotification('Error: ' + error.message, 'error');
                } finally {
                    // Reset button
                    if (generateBtn) {
                        generateBtn.innerHTML = '<i class="fas fa-bolt"></i> Generate QR Code';
                        generateBtn.disabled = false;
                    }
                }
            }
            
            // Add QR code to recent list
            function addToRecentQrCodes(qrData, qrGenerator) {
                const recentItem = {
                    ...qrData,
                    color: currentQrColor,
                    timestamp: new Date().toISOString(),
                    imageUrl: qrGenerator.getDataURL()
                };
                
                // Check if already exists
                const existingIndex = recentQrCodes.findIndex(item => 
                    item.cardId === qrData.cardId && item.type === qrData.type
                );
                
                if (existingIndex !== -1) {
                    recentQrCodes.splice(existingIndex, 1);
                }
                
                // Add to beginning
                recentQrCodes.unshift(recentItem);
                
                // Keep only last 6
                if (recentQrCodes.length > 6) {
                    recentQrCodes = recentQrCodes.slice(0, 6);
                }
                
                // Save to localStorage
                localStorage.setItem('recentQrCodes', JSON.stringify(recentQrCodes));
                
                // Update display
                updateRecentQrGrid();
            }
            
            // Update recent QR codes grid
            function updateRecentQrGrid() {
                if (!recentQrGrid) return;
                
                if (recentQrCodes.length === 0) {
                    recentQrGrid.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #999; grid-column: 1 / -1;">
                            <i class="fas fa-qrcode" style="font-size: 3rem; margin-bottom: 15px;"></i>
                            <p>No QR codes generated yet. Generate your first one above!</p>
                        </div>
                    `;
                    return;
                }
                
                let gridHTML = '';
                recentQrCodes.forEach((qr, index) => {
                    gridHTML += `
                    <div style="background: #f9f9f9; border-radius: 10px; padding: 15px; text-align: center; border: 2px solid #e6f7f3; cursor: pointer;" class="recent-qr-item" data-index="${index}">
                        <div style="width: 120px; height: 120px; margin: 0 auto 10px; background: white; border-radius: 8px; padding: 10px; display: flex; align-items: center; justify-content: center;">
                            <div style="font-size: 2rem; color: ${qr.color};">
                                <i class="fas fa-qrcode"></i>
                            </div>
                        </div>
                        <div style="font-weight: bold; color: #11998e; font-size: 0.9rem; margin-bottom: 5px; word-break: break-all;">
                            ${qr.label.substring(0, 15)}${qr.label.length > 15 ? '...' : ''}
                        </div>
                        <div style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">
                            ${new Date(qr.timestamp).toLocaleDateString()}
                        </div>
                        <div style="display: flex; gap: 5px; justify-content: center;">
                            <button class="load-recent-btn" data-index="${index}" style="padding: 5px 10px; border-radius: 5px; border: none; background: #11998e; color: white; cursor: pointer; font-size: 0.8rem;">
                                <i class="fas fa-redo"></i> Load
                            </button>
                            <button class="delete-recent-btn" data-index="${index}" style="padding: 5px 10px; border-radius: 5px; border: none; background: #ff416c; color: white; cursor: pointer; font-size: 0.8rem;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    `;
                });
                
                recentQrGrid.innerHTML = gridHTML;
                
                // Add event listeners to recent QR items
                document.querySelectorAll('.load-recent-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const index = parseInt(this.getAttribute('data-index'));
                        loadRecentQrCode(index);
                    });
                });
                
                document.querySelectorAll('.delete-recent-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const index = parseInt(this.getAttribute('data-index'));
                        deleteRecentQrCode(index);
                    });
                });
            }
            
            // Load recent QR code
            function loadRecentQrCode(index) {
                const qr = recentQrCodes[index];
                
                // Set values
                if (qr.type === 'card' && cardIdInput) {
                    cardIdInput.value = qr.cardId;
                }
                
                // Set color
                currentQrColor = qr.color;
                updateColorSelection(currentQrColor);
                
                // Set QR type
                document.querySelectorAll('input[name="qrType"]').forEach(radio => {
                    if (radio.value === qr.type) {
                        radio.checked = true;
                        radio.parentElement.classList.add('active');
                    } else {
                        radio.parentElement.classList.remove('active');
                    }
                });
                
                updateDynamicOptions();
                
                // Generate QR code
                generateQR();
                
                showNotification(`Loaded QR code for ${qr.label}`, 'success');
            }
            
            // Delete recent QR code
            function deleteRecentQrCode(index) {
                if (confirm('Delete this QR code from recent list?')) {
                    recentQrCodes.splice(index, 1);
                    localStorage.setItem('recentQrCodes', JSON.stringify(recentQrCodes));
                    updateRecentQrGrid();
                    showNotification('QR code removed from recent list', 'info');
                }
            }
            
            // Update color selection
            function updateColorSelection(color) {
                colorBoxes.forEach(box => {
                    box.classList.remove('active');
                    if (box.getAttribute('data-color') === color) {
                        box.classList.add('active');
                    }
                });
            }
            
            // Initialize everything
            function initializeApp() {
                console.log('Initializing application...');
                
                // Set initial sync status
                updateSyncStatus(false);
                
                // Initialize Supabase
                const supabaseInitialized = initializeSupabase();
                
                // Initialize QR code generator UI
                updateDynamicOptions();
                updateRecentQrGrid();
                
                // Set up event listeners
                if (qrTypeRadios) {
                    qrTypeRadios.forEach(radio => {
                        radio.addEventListener('change', function() {
                            // Update active class
                            document.querySelectorAll('.qr-option').forEach(option => {
                                option.classList.remove('active');
                            });
                            if (this.parentElement) {
                                this.parentElement.classList.add('active');
                            }
                            
                            // Update options
                            updateDynamicOptions();
                        });
                    });
                }
                
                if (colorBoxes) {
                    colorBoxes.forEach(box => {
                        box.addEventListener('click', function() {
                            currentQrColor = this.getAttribute('data-color');
                            updateColorSelection(currentQrColor);
                            
                            // Update existing QR code color
                            if (qrCanvas && qrCanvas.style.display === 'block') {
                                const qrGenerator = new QRCodeGenerator();
                                qrGenerator.changeColor(currentQrColor);
                            }
                        });
                    });
                }
                
                // Card selection from dropdown
                if (cardSelect) {
                    cardSelect.addEventListener('change', function() {
                        if (this.value && cardIdInput) {
                            cardIdInput.value = this.value;
                            // Set QR type to card
                            const typeCardRadio = document.getElementById('typeCard');
                            if (typeCardRadio) {
                                typeCardRadio.checked = true;
                                document.querySelectorAll('.qr-option').forEach(option => {
                                    option.classList.remove('active');
                                });
                                if (typeCardRadio.parentElement) {
                                    typeCardRadio.parentElement.classList.add('active');
                                }
                            }
                            updateDynamicOptions();
                            
                            // Show card info if available
                            const cardDetails = getCardDetails(this.value);
                            if (cardDetails) {
                                showNotification(`Selected: ${cardDetails.type} - ${cardDetails.message.substring(0, 50)}...`, 'info');
                            }
                        }
                    });
                }
                
                if (generateBtn) {
                    generateBtn.addEventListener('click', generateQR);
                }
                
                if (clearBtn) {
                    clearBtn.addEventListener('click', function() {
                        if (cardIdInput) cardIdInput.value = '';
                        if (qrCanvas) qrCanvas.style.display = 'none';
                        if (emptyQr) emptyQr.style.display = 'block';
                        if (qrInfo) qrInfo.style.display = 'none';
                        showNotification('Cleared QR code', 'info');
                    });
                }
                
                if (downloadPngBtn) {
                    downloadPngBtn.addEventListener('click', function() {
                        if (!qrCanvas || qrCanvas.style.display !== 'block') {
                            showNotification('No QR code to download', 'error');
                            return;
                        }
                        
                        const qrGenerator = new QRCodeGenerator();
                        const filename = `QRCode-${currentQrData ? currentQrData.label.replace(/[^a-z0-9]/gi, '-') : 'qr'}-${Date.now()}.png`;
                        qrGenerator.download(filename);
                        showNotification('QR code downloaded as PNG', 'success');
                    });
                }
                
                if (shareBtn) {
                    shareBtn.addEventListener('click', function() {
                        if (!qrCanvas || qrCanvas.style.display !== 'block') {
                            showNotification('No QR code to share', 'error');
                            return;
                        }
                        
                        const qrGenerator = new QRCodeGenerator();
                        const dataURL = qrGenerator.getDataURL();
                        
                        // Copy to clipboard using modern API
                        navigator.clipboard.writeText(dataURL).then(() => {
                            showNotification('QR code image copied to clipboard!', 'success');
                        }).catch(err => {
                            // Fallback for older browsers
                            const tempInput = document.createElement('input');
                            tempInput.value = dataURL;
                            document.body.appendChild(tempInput);
                            tempInput.select();
                            document.execCommand('copy');
                            document.body.removeChild(tempInput);
                            showNotification('QR code image copied to clipboard!', 'success');
                        });
                    });
                }
                
                // Load cards from Supabase
                if (supabaseInitialized) {
                    setTimeout(() => {
                        loadCardsFromSupabase();
                    }, 500);
                } else {
                    // Add some sample cards if Supabase is not connected
                    if (cardSelect) {
                        cardSelect.innerHTML = '<option value="">Supabase not connected. Using demo cards.</option>';
                        const sampleOption = document.createElement('option');
                        sampleOption.value = 'CARD1234';
                        sampleOption.textContent = 'CARD1234 - Sample AR Card';
                        cardSelect.appendChild(sampleOption);
                    }
                }
                
                // Auto-generate a sample QR code on load
                setTimeout(() => {
                    generateQR();
                }, 1000);
                
                console.log('QR Code Generator initialized successfully!');
                console.log('Supabase connected:', isSupabaseConnected);
            }
            
            // Start the application
            initializeApp();
        });
    </script>
</body>
</html>
