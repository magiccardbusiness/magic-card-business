<!DOCTYPE html>
<html>
<head>
    <title>Magic Card QR Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        
        .magic-i {
            color: #FFD700;
            display: inline-block;
            position: relative;
        }
        
        .magic-i::before {
            content: "★";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
        }
        
        .card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid #e9ecef;
        }
        
        .card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            font-family: inherit;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .file-upload {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            background: #f0f4ff;
            margin-bottom: 15px;
            cursor: pointer;
        }
        
        .file-upload:active {
            background: #e6ebff;
        }
        
        .file-label {
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
        }
        
        .preview {
            margin-top: 15px;
            text-align: center;
        }
        
        .preview video, .preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            border: 3px solid #667eea;
        }
        
        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .generate-btn:active {
            transform: scale(0.98);
        }
        
        .qrcode-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #e9ecef;
            margin-top: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        
        .url-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            word-break: break-all;
            font-size: 14px;
            margin-top: 15px;
            border: 2px solid #dee2e6;
        }
        
        .test-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        
        .clear-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MAG<span class="magic-i">I</span>C CARD</div>
        
        <div class="card">
            <h3>📝 Create Your Message</h3>
            
            <input type="text" id="cardId" placeholder="Card ID (e.g., BIRTHDAY001)" value="TEST<?php echo rand(100,999); ?>">
            
            <select id="messageType">
                <option value="text">Text Message</option>
                <option value="video" selected>Video Message</option>
                <option value="image">Image Message</option>
            </select>
            
            <div id="textInput">
                <textarea id="messageText" placeholder="Type your message here...">🎉 Happy Birthday! 🎂</textarea>
            </div>
            
            <div id="mediaInput" style="display: none;">
                <div class="file-upload" onclick="document.getElementById('fileInput').click()">
                    <div class="file-label">
                        📱 TAP TO UPLOAD VIDEO/IMAGE
                    </div>
                    <input type="file" id="fileInput" accept="video/*,image/*" style="display: none;">
                </div>
                
                <div class="preview" id="mediaPreview"></div>
            </div>
            
            <input type="text" id="cloudinaryUrl" placeholder="Cloudinary URL (optional)" value="https://res.cloudinary.com/diqa9qyvh/video/upload/v1767377987/20251219_010742000_iOS_xuandm.mp4">
            
            <button class="generate-btn" onclick="generateQR()">
                🪄 GENERATE QR CODE
            </button>
            
            <button class="clear-btn" onclick="clearAll()">
                🗑️ CLEAR & RESET
            </button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="card">
            <h3>📱 Your QR Code</h3>
            <div class="qrcode-container" id="qrcode">
                <div style="color: #666;">
                    QR Code will appear here<br>
                    ⬆ Fill form above and click "GENERATE"
                </div>
            </div>
            
            <div class="url-display" id="urlDisplay">
                URL will appear here
            </div>
            
            <button class="test-btn" onclick="testQR()" id="testBtn" disabled>
                🔗 TEST IN NEW TAB
            </button>
        </div>
    </div>

    <script>
        // Elements
        const messageTypeSelect = document.getElementById('messageType');
        const textInput = document.getElementById('textInput');
        const mediaInput = document.getElementById('mediaInput');
        const fileInput = document.getElementById('fileInput');
        const mediaPreview = document.getElementById('mediaPreview');
        const statusDiv = document.getElementById('status');
        const qrcodeDiv = document.getElementById('qrcode');
        const urlDisplay = document.getElementById('urlDisplay');
        const testBtn = document.getElementById('testBtn');
        
        let uploadedFileUrl = '';
        let generatedUrl = '';
        
        // Show/hide fields based on message type
        messageTypeSelect.addEventListener('change', function() {
            const type = this.value;
            if (type === 'text') {
                textInput.style.display = 'block';
                mediaInput.style.display = 'none';
            } else {
                textInput.style.display = 'none';
                mediaInput.style.display = 'block';
            }
            mediaPreview.style.display = 'none';
            uploadedFileUrl = '';
        });
        
        // Set default to video
        messageTypeSelect.value = 'video';
        mediaInput.style.display = 'block';
        textInput.style.display = 'none';
        
        // Handle file upload
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            console.log('File selected:', file.name, file.size);
            
            // Clear old preview
            mediaPreview.innerHTML = '';
            mediaPreview.style.display = 'block';
            
            if (file.type.startsWith('video/')) {
                const url = URL.createObjectURL(file);
                mediaPreview.innerHTML = `
                    <video controls style="max-width: 100%; max-height: 200px;">
                        <source src="${url}" type="${file.type}">
                    </video>
                    <div style="margin-top: 10px; color: #666;">
                        ${file.name} (${formatSize(file.size)})
                    </div>
                `;
                uploadedFileUrl = url;
            } else if (file.type.startsWith('image/')) {
                const url = URL.createObjectURL(file);
                mediaPreview.innerHTML = `
                    <img src="${url}" style="max-width: 100%; max-height: 200px;">
                    <div style="margin-top: 10px; color: #666;">
                        ${file.name} (${formatSize(file.size)})
                    </div>
                `;
                uploadedFileUrl = url;
            }
            
            showStatus('✅ File loaded successfully!', 'success');
        });
        
        // Format file size
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        // 🚀 MAIN FUNCTION: Generate QR Code
        function generateQR() {
            console.log('Generate QR called');
            
            const cardId = document.getElementById('cardId').value.trim() || 'TEST' + Date.now().toString().slice(-6);
            const messageType = messageTypeSelect.value;
            let messageContent = '';
            
            // Get content
            if (messageType === 'text') {
                messageContent = document.getElementById('messageText').value.trim();
                if (!messageContent) {
                    showStatus('❌ Please enter a message', 'error');
                    return;
                }
            } else {
                // Check Cloudinary URL
                const cloudinaryUrl = document.getElementById('cloudinaryUrl').value.trim();
                if (cloudinaryUrl && cloudinaryUrl.startsWith('http')) {
                    messageContent = cloudinaryUrl;
                } else if (uploadedFileUrl) {
                    // Use local file (for testing)
                    messageContent = 'LOCAL_FILE_' + Date.now();
                    showStatus('⚠ Using local file (test mode)', 'success');
                } else {
                    showStatus('❌ Please upload a file or enter Cloudinary URL', 'error');
                    return;
                }
            }
            
            // Create data with cache-busting timestamp
            const messageData = {
                card: cardId + '_' + Date.now(), // UNIQUE every time
                type: messageType,
                message: messageContent,
                timestamp: Date.now()
            };
            
            // Convert to URL
            const arPageUrl = 'https://magic-card-business.vercel.app/';
            const jsonStr = JSON.stringify(messageData);
            const base64 = btoa(jsonStr);
            generatedUrl = arPageUrl + '#' + base64;
            
            console.log('Generated URL:', generatedUrl);
            
            // Clear QR code area
            qrcodeDiv.innerHTML = '';
            
            // Generate QR code
            try {
                // Create QR code using the library
                new QRCode(qrcodeDiv, {
                    text: generatedUrl,
                    width: 256,
                    height: 256,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
                
                // Show URL
                urlDisplay.textContent = generatedUrl.substring(0, 100) + '...';
                urlDisplay.title = generatedUrl;
                
                // Enable test button
                testBtn.disabled = false;
                
                showStatus('✅ QR Code Generated Successfully!', 'success');
                
            } catch (error) {
                console.error('QR Code error:', error);
                qrcodeDiv.innerHTML = `
                    <div style="color: red;">
                        ❌ QR Code Error<br>
                        <small>${error.message}</small>
                    </div>
                `;
                showStatus('❌ Error generating QR code', 'error');
            }
        }
        
        // Test QR code
        function testQR() {
            if (!generatedUrl) {
                showStatus('❌ Generate a QR code first', 'error');
                return;
            }
            
            // Add cache busting
            const testUrl = generatedUrl + '&_=' + Date.now();
            window.open(testUrl, '_blank');
            showStatus('🔗 Opening in new tab...', 'success');
        }
        
        // Clear everything
        function clearAll() {
            // Clear file preview
            if (uploadedFileUrl && uploadedFileUrl.startsWith('blob:')) {
                URL.revokeObjectURL(uploadedFileUrl);
            }
            
            // Reset form
            document.getElementById('cardId').value = 'TEST' + Date.now().toString().slice(-6);
            document.getElementById('messageText').value = '🎉 Happy Birthday! 🎂';
            document.getElementById('cloudinaryUrl').value = 'https://res.cloudinary.com/diqa9qyvh/video/upload/v1767377987/20251219_010742000_iOS_xuandm.mp4';
            
            // Clear preview
            mediaPreview.innerHTML = '';
            mediaPreview.style.display = 'none';
            uploadedFileUrl = '';
            
            // Clear QR code
            qrcodeDiv.innerHTML = `
                <div style="color: #666;">
                    QR Code will appear here<br>
                    ⬆ Fill form above and click "GENERATE"
                </div>
            `;
            
            // Clear URL
            urlDisplay.textContent = 'URL will appear here';
            testBtn.disabled = true;
            
            // Force reload
            location.reload();
            
            showStatus('🗑️ Everything cleared! Ready for new QR code.', 'success');
        }
        
        // Show status message
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
        
        // Initialize
        window.onload = function() {
            console.log('QR Generator loaded');
            showStatus('📱 Ready! Upload video or use Cloudinary URL', 'success');
            
            // Test if QRCode library is loaded
            if (typeof QRCode === 'undefined') {
                showStatus('❌ QRCode library failed to load. Refresh page.', 'error');
            }
        };
    </script>
</body>
</html>
