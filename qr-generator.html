<!DOCTYPE html>
<html>
<head>
    <title>Magic Card QR Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #667eea;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        textarea {
            height: 100px;
            resize: vertical;
        }
        
        .generate-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .result-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        #qrcode {
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #qrcode canvas {
            border: 10px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 100%;
        }
        
        .url-box {
            background: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            word-break: break-all;
            font-size: 14px;
            border: 1px solid #ddd;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .copy-btn { background: #28a745; color: white; }
        .test-btn { background: #007bff; color: white; }
        .download-btn { background: #6f42c1; color: white; }
        
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
            font-weight: bold;
        }
        
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Magic Card QR Generator</h1>
        
        <div class="form-section">
            <div class="form-group">
                <label>Card ID:</label>
                <input type="text" id="cardId" value="TEST123">
            </div>
            
            <div class="form-group">
                <label>Message Type:</label>
                <select id="messageType">
                    <option value="text">Text</option>
                    <option value="video">Video</option>
                    <option value="image">Image</option>
                    <option value="audio">Audio</option>
                </select>
            </div>
            
            <div class="form-group" id="textInput">
                <label>Message:</label>
                <textarea id="messageText">Happy Birthday!</textarea>
            </div>
            
            <div class="form-group" id="urlInput" style="display: none;">
                <label>Media URL:</label>
                <input type="text" id="mediaUrl" value="https://example.com/video.mp4">
            </div>
            
            <button class="generate-btn" onclick="generateQRCode()">
                GENERATE QR CODE
            </button>
            
            <div id="status" class="status"></div>
        </div>
        
        <div class="result-section">
            <h2>Your QR Code</h2>
            <div id="qrcode">
                QR code will appear here
            </div>
            <div class="url-box" id="urlDisplay">URL will appear here</div>
            <div class="action-buttons">
                <button class="action-btn copy-btn" onclick="copyURL()" id="copyBtn" disabled>Copy URL</button>
                <button class="action-btn test-btn" onclick="testQR()" id="testBtn" disabled>Test</button>
                <button class="action-btn download-btn" onclick="downloadQR()" id="downloadBtn" disabled>Download</button>
            </div>
        </div>
    </div>

    <script>
        // Simple message type handler
        document.getElementById('messageType').addEventListener('change', function() {
            const type = this.value;
            if (type === 'text') {
                document.getElementById('textInput').style.display = 'block';
                document.getElementById('urlInput').style.display = 'none';
            } else {
                document.getElementById('textInput').style.display = 'none';
                document.getElementById('urlInput').style.display = 'block';
            }
        });

        let currentUrl = '';
        let currentQRCodeCanvas = null;

        function generateQRCode() {
            console.log("Generating QR code...");
            
            const cardId = document.getElementById('cardId').value || 'TEST123';
            const messageType = document.getElementById('messageType').value;
            let messageContent = '';
            
            if (messageType === 'text') {
                messageContent = document.getElementById('messageText').value || 'Hello World';
            } else {
                messageContent = document.getElementById('mediaUrl').value || 'https://example.com/video.mp4';
            }
            
            // Create data
            const data = {
                card: cardId,
                type: messageType,
                message: messageContent,
                time: Date.now()
            };
            
            // Create URL
            const baseUrl = 'https://magic-card-business.vercel.app/';
            const jsonStr = JSON.stringify(data);
            const base64 = btoa(jsonStr);
            currentUrl = baseUrl + '#' + base64;
            
            console.log("Generated URL:", currentUrl);
            
            // Show loading
            document.getElementById('qrcode').innerHTML = 'Generating QR code...';
            showStatus('Generating...', 'success');
            
            // Generate QR code using qrcode-generator library
            try {
                const qr = qrcode(0, 'M');
                qr.addData(currentUrl);
                qr.make();
                
                // Create canvas
                const canvas = document.createElement('canvas');
                const size = 300;
                const cellSize = size / qr.getModuleCount();
                const margin = 10;
                const fullSize = size + margin * 2;
                
                canvas.width = fullSize;
                canvas.height = fullSize;
                const ctx = canvas.getContext('2d');
                
                // White background
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, fullSize, fullSize);
                
                // Draw QR code
                ctx.fillStyle = '#000000';
                const count = qr.getModuleCount();
                
                for (let row = 0; row < count; row++) {
                    for (let col = 0; col < count; col++) {
                        if (qr.isDark(row, col)) {
                            ctx.fillRect(
                                margin + col * cellSize,
                                margin + row * cellSize,
                                cellSize,
                                cellSize
                            );
                        }
                    }
                }
                
                // Add to page
                document.getElementById('qrcode').innerHTML = '';
                document.getElementById('qrcode').appendChild(canvas);
                document.getElementById('urlDisplay').textContent = currentUrl;
                
                // Store for download
                currentQRCodeCanvas = canvas;
                
                // Enable buttons
                document.getElementById('copyBtn').disabled = false;
                document.getElementById('testBtn').disabled = false;
                document.getElementById('downloadBtn').disabled = false;
                
                showStatus('QR Code Generated!', 'success');
                console.log("QR Code generated successfully!");
                
            } catch (error) {
                console.error("QR generation error:", error);
                document.getElementById('qrcode').innerHTML = 'Error: ' + error.message;
                showStatus('Error generating QR', 'error');
            }
        }

        function copyURL() {
            if (!currentUrl) return;
            navigator.clipboard.writeText(currentUrl).then(() => {
                showStatus('URL copied!', 'success');
            });
        }

        function testQR() {
            if (!currentUrl) return;
            window.open(currentUrl + '&_=' + Date.now(), '_blank');
        }

        function downloadQR() {
            if (!currentQRCodeCanvas) return;
            const link = document.createElement('a');
            link.download = 'magic-card-qr.png';
            link.href = currentQRCodeCanvas.toDataURL('image/png');
            link.click();
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.style.display = 'block';
            setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
        }

        // Auto-generate on load
        window.onload = function() {
            console.log("Page loaded, QRCode library:", typeof qrcode);
            if (typeof qrcode === 'undefined') {
                document.getElementById('qrcode').innerHTML = 'Error: QRCode library failed to load';
                showStatus('Library failed to load', 'error');
            } else {
                setTimeout(generateQRCode, 500);
            }
        };
    </script>
</body>
</html>
