<!DOCTYPE html>
<html>
<head>
    <title>Magic Card</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; }
        body { 
            background: black; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        
        /* Company Logo */
        #company-logo {
            position: fixed;
            top: 25px;
            left: 0;
            width: 100%;
            color: white;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            z-index: 1000;
        }
        
        .magic-i {
            position: relative;
            display: inline-block;
            color: #FFD700;
        }
        
        .magic-i::before {
            content: "★";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #FFD700;
        }
        
        /* INSTRUCTIONS - UNDER LOGO */
        #instructions {
            position: fixed;
            top: 75px; /* RIGHT UNDER THE LOGO */
            left: 0;
            width: 100%;
            color: #AAAAAA;
            text-align: center;
            font-size: 14px;
            z-index: 1000;
            padding: 0 20px;
            line-height: 1.4;
        }
        
        #magic-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #2C3E50;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            z-index: 1001;
            cursor: pointer;
            border: 1px solid #34495E;
        }
        
        #video-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 15px;
            z-index: 1002;
            display: none;
            border-top: 1px solid #333;
        }
        
        #timeline-container {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
            margin-bottom: 14px;
            cursor: pointer;
        }
        
        #progress-bar {
            height: 100%;
            background: #FFD700;
            border-radius: 3px;
            width: 0%;
        }
        
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .time-display {
            color: #AAA;
            font-size: 13px;
            font-family: monospace;
            min-width: 80px;
        }
        
        .buttons-container {
            display: flex;
            gap: 8px;
        }
        
        .control-btn {
            background: #2C3E50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            min-width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        #play-pause-btn { background: #27AE60; }
        #stop-btn { background: #E74C3C; }
        #save-btn { background: #9B59B6; }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Card message display */
        #card-message {
            position: fixed;
            top: 120px;
            left: 0;
            width: 100%;
            color: #FFD700;
            text-align: center;
            font-size: 16px;
            z-index: 1003;
            padding: 0 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="company-logo">
        MAG<span class="magic-i">I</span>C CARD
    </div>
    
    <!-- Instructions - DIRECTLY UNDER LOGO -->
    <div id="instructions">
        Point camera → Tap button for magic message
    </div>
    
    <!-- Card Message Display -->
    <div id="card-message"></div>
    
    <button id="magic-btn">▶ PLAY MAGIC MESSAGE</button>
    
    <div id="video-controls">
        <div id="timeline-container">
            <div id="progress-bar"></div>
        </div>
        
        <div class="controls-row">
            <div class="time-display">
                <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
            </div>
            
            <div class="buttons-container">
                <button id="play-pause-btn" class="control-btn">
                    <span>⏸</span> <span>PAUSE</span>
                </button>
                <button id="stop-btn" class="control-btn">
                    <span>⏹</span> <span>STOP</span>
                </button>
                <button id="save-btn" class="control-btn">
                    <span>💾</span> <span>SAVE</span>
                </button>
            </div>
        </div>
    </div>
    
    <a-scene embedded>
        <a-camera></a-camera>
        <a-light type="ambient" color="#FFFFFF" intensity="0.8"></a-light>
        
        <!-- FRAME WITH ADJUSTED POSITION AND ROTATION -->
        <a-entity position="0 0 -2">
            <!-- Wooden Frame - TILTED and HIGHER -->
            <a-box id="wood-frame"
                   width="2.0" height="1.4" depth="0.08"
                   position="0 0.8 0"
                   rotation="-10 0 0"
                   color="#8B7355" roughness="0.7"
                   visible="false">
            </a-box>
            
            <!-- Video screen - SAME ADJUSTMENTS -->
            <a-plane id="video-screen"
                    width="1.85" height="1.25"
                    position="0 0.8 0.05"
                    rotation="-10 0 0"
                    material="side: double; color: #000000"
                    visible="false">
                <a-video id="ar-video"
                        width="1.85" height="1.25"
                        position="0 0 0.01">
                </a-video>
            </a-plane>
            
            <!-- Text Display (for text messages) -->
            <a-text id="text-display"
                    value=""
                    color="#FFFFFF"
                    align="center"
                    width="1.8"
                    position="0 0.8 0.05"
                    rotation="-10 0 0"
                    visible="false">
            </a-text>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const magicBtn = document.getElementById('magic-btn');
            const woodFrame = document.getElementById('wood-frame');
            const videoScreen = document.getElementById('video-screen');
            const textDisplay = document.getElementById('text-display');
            const videoControls = document.getElementById('video-controls');
            const progressBar = document.getElementById('progress-bar');
            const currentTimeEl = document.getElementById('current-time');
            const totalTimeEl = document.getElementById('total-time');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const stopBtn = document.getElementById('stop-btn');
            const saveBtn = document.getElementById('save-btn');
            const timelineContainer = document.getElementById('timeline-container');
            const instructions = document.getElementById('instructions');
            const cardMessageDiv = document.getElementById('card-message');
            
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('card');
            const messageType = urlParams.get('type');
            const messageContent = urlParams.get('message');
            
            let video;
            let currentMessageType = 'video'; // Default
            let currentMessageContent = '';
            
            // Check if we have card data
            if (cardId && messageType && messageContent) {
                currentMessageType = messageType;
                currentMessageContent = decodeURIComponent(messageContent);
                
                // Update UI for card message
                cardMessageDiv.textContent = `Card: ${cardId}`;
                cardMessageDiv.style.display = 'block';
                
                // Update instructions
                instructions.textContent = "Point camera at card → View special message";
                
                // Update button text
                magicBtn.textContent = `▶ PLAY ${cardId} MESSAGE`;
            }
            
            // Initialize based on message type
            if (currentMessageType === 'text') {
                // Setup for text message
                video = document.createElement('video');
                video.id = 'message-video';
                // Use a silent video for text display timing
                video.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4';
                video.loop = true;
                video.playsInline = true;
                video.crossOrigin = 'anonymous';
                video.preload = 'auto';
                video.muted = true;
                video.style.display = 'none';
                document.body.appendChild(video);
                
                // Set text content
                textDisplay.setAttribute('value', currentMessageContent);
                
            } else if (currentMessageType === 'video' || currentMessageType === 'audio') {
                // Setup for video/audio
                video = document.createElement('video');
                video.id = 'message-video';
                
                // Use provided URL or default
                if (currentMessageContent && currentMessageContent.startsWith('http')) {
                    video.src = currentMessageContent;
                } else if (currentMessageType === 'video') {
                    video.src = 'https://res.cloudinary.com/diqa9qyvh/video/upload/v1767377987/20251219_010742000_iOS_xuandm.mp4';
                } else {
                    video.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4';
                }
                
                video.loop = true;
                video.playsInline = true;
                video.crossOrigin = 'anonymous';
                video.preload = 'auto';
                video.muted = true;
                document.body.appendChild(video);
            } else {
                // Default video
                video = document.createElement('video');
                video.id = 'message-video';
                video.src = 'https://res.cloudinary.com/diqa9qyvh/video/upload/v1767377987/20251219_010742000_iOS_xuandm.mp4';
                video.loop = true;
                video.playsInline = true;
                video.crossOrigin = 'anonymous';
                video.preload = 'auto';
                video.muted = true;
                document.body.appendChild(video);
            }
            
            // Wait for A-Frame scene to load
            const scene = document.querySelector('a-scene');
            let videoReady = false;
            
            scene.addEventListener('loaded', function() {
                console.log('A-Frame scene loaded');
                
                if (currentMessageType === 'text') {
                    // Setup for text display
                    textDisplay.setAttribute('visible', 'false');
                    console.log('Text message ready:', currentMessageContent.substring(0, 50) + '...');
                } else {
                    // Setup for video
                    const arVideo = document.getElementById('ar-video');
                    if (arVideo) {
                        arVideo.setAttribute('src', '#message-video');
                        videoReady = true;
                        console.log('Video connected to A-Frame');
                    }
                }
            });
            
            // Format time
            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }
            
            // Update timeline
            function updateVideoProgress() {
                if (video.duration) {
                    const percent = (video.currentTime / video.duration) * 100;
                    progressBar.style.width = percent + '%';
                    currentTimeEl.textContent = formatTime(video.currentTime);
                }
            }
            
            // Update video time display
            video.addEventListener('timeupdate', updateVideoProgress);
            
            // Update total duration when loaded
            video.addEventListener('loadedmetadata', function() {
                if (video.duration) {
                    totalTimeEl.textContent = formatTime(video.duration);
                }
            });
            
            // Click timeline to seek
            timelineContainer.addEventListener('click', function(e) {
                if (video.duration) {
                    const rect = this.getBoundingClientRect();
                    const percent = (e.clientX - rect.left) / rect.width;
                    video.currentTime = percent * video.duration;
                    updateVideoProgress();
                }
            });
            
            // Play/Pause button
            playPauseBtn.addEventListener('click', function() {
                if (video.paused) {
                    video.play().then(() => {
                        console.log('Video playing');
                        playPauseBtn.innerHTML = '<span>⏸</span> <span>PAUSE</span>';
                        playPauseBtn.style.background = '#27AE60';
                    }).catch(error => {
                        console.log('Play error:', error);
                    });
                } else {
                    video.pause();
                    playPauseBtn.innerHTML = '<span>▶</span> <span>PLAY</span>';
                    playPauseBtn.style.background = '#3498DB';
                }
            });
            
            // Stop button
            stopBtn.addEventListener('click', function() {
                video.pause();
                video.currentTime = 0;
                playPauseBtn.innerHTML = '<span>▶</span> <span>PLAY</span>';
                playPauseBtn.style.background = '#3498DB';
                updateVideoProgress();
            });
            
            // Save button
            saveBtn.addEventListener('click', function() {
                const a = document.createElement('a');
                a.href = video.src;
                a.download = `Magic-Card-${cardId || 'Message'}.mp4`;
                
                const originalHTML = saveBtn.innerHTML;
                saveBtn.innerHTML = '<span>⏳</span> <span>SAVING...</span>';
                saveBtn.style.background = '#FF9800';
                saveBtn.disabled = true;
                
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                setTimeout(() => {
                    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                    
                    if (isIOS) {
                        alert('📱 To save to Photos:\n1. Open Files app\n2. Find the video\n3. Tap Share → Save Video');
                    } else {
                        alert('✅ Video saved! Check Downloads folder.');
                    }
                    
                    saveBtn.innerHTML = originalHTML;
                    saveBtn.style.background = '#9B59B6';
                    saveBtn.disabled = false;
                }, 1500);
            });
            
            // MAGIC BUTTON - Main trigger
            magicBtn.addEventListener('click', function() {
                magicBtn.textContent = 'LOADING...';
                magicBtn.style.background = '#27AE60';
                
                // Show the appropriate display
                if (currentMessageType === 'text') {
                    // Show text frame
                    if (woodFrame) woodFrame.setAttribute('visible', 'true');
                    textDisplay.setAttribute('visible', 'true');
                    videoScreen.setAttribute('visible', 'false');
                } else {
                    // Show video frame
                    if (woodFrame) woodFrame.setAttribute('visible', 'true');
                    if (videoScreen) videoScreen.setAttribute('visible', 'true');
                    textDisplay.setAttribute('visible', 'false');
                }
                
                // Wait a moment then play
                setTimeout(function() {
                    video.muted = false;
                    
                    video.play().then(function() {
                        console.log('Magic message playing!');
                        
                        // Show controls (for video/audio only)
                        if (currentMessageType !== 'text') {
                            magicBtn.style.display = 'none';
                            videoControls.style.display = 'block';
                        } else {
                            // For text, just show the message
                            magicBtn.style.display = 'none';
                        }
                        
                        // UPDATE INSTRUCTIONS TEXT
                        if (cardId) {
                            instructions.textContent = `Viewing message from card: ${cardId}`;
                        } else {
                            instructions.textContent = "Use controls below to manage your message";
                        }
                        
                        // Update duration if needed
                        if (video.duration && totalTimeEl.textContent === '0:00') {
                            totalTimeEl.textContent = formatTime(video.duration);
                        }
                        
                    }).catch(function(error) {
                        console.log('Failed to play:', error);
                        magicBtn.textContent = cardId ? `▶ PLAY ${cardId}` : '▶ PLAY MAGIC MESSAGE';
                        magicBtn.style.background = '#E74C3C';
                        
                        // Try playing with user interaction
                        document.body.addEventListener('click', function tryPlay() {
                            video.play().then(() => {
                                console.log('Played after user interaction');
                                document.body.removeEventListener('click', tryPlay);
                            });
                        }, { once: true });
                    });
                }, 800);
            });
            
            // Help with iOS audio
            document.addEventListener('click', function initAudio() {
                if (video.paused) {
                    video.muted = false;
                }
                document.removeEventListener('click', initAudio);
            });
            
            // Auto-play if coming from card page with a message
            if (cardId && messageType && messageContent) {
                setTimeout(() => {
                    magicBtn.click();
                }, 1000);
            }
        });
    </script>
</body>
</html>
