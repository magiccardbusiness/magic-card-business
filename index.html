<!DOCTYPE html>
<html>
<head>
    <title>Magic Card</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; }
        body { 
            background: black; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        
        #company-logo {
            position: fixed;
            top: 25px;
            left: 0;
            width: 100%;
            color: white;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            z-index: 1000;
        }
        
        .magic-i {
            position: relative;
            display: inline-block;
            color: #FFD700;
        }
        
        .magic-i::before {
            content: "★";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #FFD700;
        }
        
        #instructions {
            position: fixed;
            top: 75px;
            left: 0;
            width: 100%;
            color: #AAAAAA;
            text-align: center;
            font-size: 14px;
            z-index: 1000;
            padding: 0 20px;
            line-height: 1.4;
        }
        
        #magic-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #2C3E50;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            z-index: 1001;
            cursor: pointer;
            border: 1px solid #34495E;
        }
        
        #video-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 15px;
            z-index: 1002;
            display: none;
            border-top: 1px solid #333;
        }
        
        #timeline-container {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
            margin-bottom: 14px;
            cursor: pointer;
        }
        
        #progress-bar {
            height: 100%;
            background: #FFD700;
            border-radius: 3px;
            width: 0%;
        }
        
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .time-display {
            color: #AAA;
            font-size: 13px;
            font-family: monospace;
            min-width: 80px;
        }
        
        .buttons-container {
            display: flex;
            gap: 8px;
        }
        
        .control-btn {
            background: #2C3E50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            min-width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        #play-pause-btn { background: #27AE60; }
        #stop-btn { background: #E74C3C; }
        #save-btn { background: #9B59B6; }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #card-message {
            position: fixed;
            top: 120px;
            left: 0;
            width: 100%;
            color: #FFD700;
            text-align: center;
            font-size: 16px;
            z-index: 1003;
            padding: 0 20px;
            display: none;
        }
        
        #error-message {
            position: fixed;
            top: 150px;
            left: 0;
            width: 100%;
            color: #FF6B6B;
            text-align: center;
            font-size: 14px;
            z-index: 1004;
            padding: 0 20px;
            display: none;
        }
        
        .spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #FFD700;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            z-index: 1005;
        }
        
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="company-logo">
        MAG<span class="magic-i">I</span>C CARD
    </div>
    
    <div class="spinner" id="loading-spinner"></div>
    
    <div id="instructions">
        Point camera → Tap button for magic message
    </div>
    
    <div id="card-message"></div>
    
    <div id="error-message"></div>
    
    <button id="magic-btn">▶ PLAY MAGIC MESSAGE</button>
    
    <div id="video-controls">
        <div id="timeline-container">
            <div id="progress-bar"></div>
        </div>
        
        <div class="controls-row">
            <div class="time-display">
                <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
            </div>
            
            <div class="buttons-container">
                <button id="play-pause-btn" class="control-btn">
                    <span>⏸</span> <span>PAUSE</span>
                </button>
                <button id="stop-btn" class="control-btn">
                    <span>⏹</span> <span>STOP</span>
                </button>
                <button id="save-btn" class="control-btn">
                    <span>💾</span> <span>SAVE</span>
                </button>
            </div>
        </div>
    </div>
    
    <a-scene embedded>
        <a-camera></a-camera>
        <a-light type="ambient" color="#FFFFFF" intensity="0.8"></a-light>
        
        <a-entity position="0 0 -2">
            <a-box id="wood-frame"
                   width="2.0" height="1.4" depth="0.08"
                   position="0 0.8 0"
                   rotation="-10 0 0"
                   color="#8B7355" roughness="0.7"
                   visible="false">
            </a-box>
            
            <a-plane id="video-screen"
                    width="1.85" height="1.25"
                    position="0 0.8 0.05"
                    rotation="-10 0 0"
                    material="side: double; color: #000000"
                    visible="false">
                <a-video id="ar-video"
                        width="1.85" height="1.25"
                        position="0 0 0.01">
                </a-video>
            </a-plane>
            
            <a-text id="text-display"
                    value=""
                    color="#FFFFFF"
                    align="center"
                    width="1.8"
                    position="0 0.8 0.05"
                    rotation="-10 0 0"
                    visible="false">
            </a-text>
            
            <a-image id="image-display"
                    width="1.85" height="1.25"
                    position="0 0.8 0.05"
                    rotation="-10 0 0"
                    visible="false">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        // 🔥🔥🔥 **SUPER SIMPLE SOLUTION** 🔥🔥🔥
        // We'll store the data IN THE URL itself using Base64 encoding
        
        document.addEventListener('DOMContentLoaded', function() {
            const magicBtn = document.getElementById('magic-btn');
            const woodFrame = document.getElementById('wood-frame');
            const videoScreen = document.getElementById('video-screen');
            const textDisplay = document.getElementById('text-display');
            const imageDisplay = document.getElementById('image-display');
            const videoControls = document.getElementById('video-controls');
            const progressBar = document.getElementById('progress-bar');
            const currentTimeEl = document.getElementById('current-time');
            const totalTimeEl = document.getElementById('total-time');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const stopBtn = document.getElementById('stop-btn');
            const saveBtn = document.getElementById('save-btn');
            const timelineContainer = document.getElementById('timeline-container');
            const instructions = document.getElementById('instructions');
            const cardMessageDiv = document.getElementById('card-message');
            const errorMessageDiv = document.getElementById('error-message');
            const loadingSpinner = document.getElementById('loading-spinner');
            
            let video = null;
            let currentMessageType = 'text';
            let currentMessageContent = '';
            let cardId = '';
            
            // 🔥 **FIX 1: Get data from URL HASH** (NOT query parameters!)
            function getDataFromUrl() {
                const hash = window.location.hash.substring(1); // Remove the #
                
                if (!hash) {
                    return null;
                }
                
                try {
                    // Decode from Base64
                    const decoded = atob(hash);
                    const data = JSON.parse(decoded);
                    return data;
                } catch (error) {
                    console.error('Failed to decode URL data:', error);
                    return null;
                }
            }
            
            // 🔥 **FIX 2: Create URL with data embedded**
            function createUrlWithData(cardId, type, message) {
                const data = {
                    card: cardId,
                    type: type,
                    message: message
                };
                
                // Convert to Base64 and put in URL hash
                const jsonString = JSON.stringify(data);
                const base64 = btoa(jsonString);
                const currentUrl = window.location.origin + window.location.pathname;
                return currentUrl + '#' + base64;
            }
            
            // Load data on page start
            function loadData() {
                loadingSpinner.style.display = 'block';
                
                const data = getDataFromUrl();
                
                if (!data) {
                    // No data in URL - check if this is the sender page?
                    showError('No message data found. Please scan a valid Magic Card QR code.');
                    magicBtn.textContent = 'SCAN A CARD QR CODE';
                    magicBtn.style.background = '#E74C3C';
                    loadingSpinner.style.display = 'none';
                    return;
                }
                
                // We have data!
                cardId = data.card || 'MagicCard';
                currentMessageType = data.type || 'text';
                currentMessageContent = data.message || '';
                
                console.log('Loaded message:', {cardId, currentMessageType, contentPreview: currentMessageContent.substring(0, 50)});
                
                // Update UI
                cardMessageDiv.textContent = `Card: ${cardId}`;
                cardMessageDiv.style.display = 'block';
                instructions.textContent = "Point camera → Tap button for magic message";
                magicBtn.textContent = `▶ PLAY ${cardId} MESSAGE`;
                
                // Setup message
                setupMessage();
                
                loadingSpinner.style.display = 'none';
            }
            
            function setupMessage() {
                if (currentMessageType === 'text') {
                    textDisplay.setAttribute('value', currentMessageContent);
                    
                } else if (currentMessageType === 'video' || currentMessageType === 'audio') {
                    video = document.createElement('video');
                    video.id = 'message-video';
                    
                    if (currentMessageContent && currentMessageContent.startsWith('http')) {
                        video.src = currentMessageContent;
                        video.crossOrigin = 'anonymous';
                    } else if (currentMessageType === 'video') {
                        video.src = 'https://res.cloudinary.com/diqa9qyvh/video/upload/v1767377987/20251219_010742000_iOS_xuandm.mp4';
                        video.crossOrigin = 'anonymous';
                    } else {
                        video.src = 'https://assets.mixkit.co/music/preview/mixkit-driving-ambition-32.mp4';
                        video.crossOrigin = 'anonymous';
                    }
                    
                    video.loop = true;
                    video.playsInline = true;
                    video.preload = 'auto';
                    video.muted = true;
                    document.body.appendChild(video);
                    
                    // Connect to A-Frame
                    const scene = document.querySelector('a-scene');
                    scene.addEventListener('loaded', function() {
                        const arVideo = document.getElementById('ar-video');
                        if (arVideo) {
                            arVideo.setAttribute('src', '#message-video');
                        }
                    });
                    
                } else if (currentMessageType === 'image') {
                    if (currentMessageContent && currentMessageContent.startsWith('http')) {
                        imageDisplay.setAttribute('src', currentMessageContent);
                    }
                }
            }
            
            // 🔥 **FIX 3: Test function - Try this in your sender page!**
            // Add this to your SENDER page (card creation page):
            /*
            function createReceiverUrl() {
                const cardId = 'CARD123';
                const messageType = 'text';
                const messageContent = 'Hello from Magic Card!';
                
                const url = createUrlWithData(cardId, messageType, messageContent);
                console.log('Receiver URL:', url);
                // Copy this URL and open in new tab - IT WILL WORK!
            }
            */
            
            function showError(message) {
                errorMessageDiv.textContent = message;
                errorMessageDiv.style.display = 'block';
            }
            
            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }
            
            // Video handlers
            function setupVideoHandlers() {
                if (!video) return;
                
                video.addEventListener('timeupdate', function() {
                    if (video.duration) {
                        const percent = (video.currentTime / video.duration) * 100;
                        progressBar.style.width = percent + '%';
                        currentTimeEl.textContent = formatTime(video.currentTime);
                    }
                });
                
                video.addEventListener('loadedmetadata', function() {
                    if (video.duration) {
                        totalTimeEl.textContent = formatTime(video.duration);
                    }
                });
                
                video.addEventListener('error', function() {
                    showError('Media failed to load');
                });
            }
            
            // Magic button click
            magicBtn.addEventListener('click', function() {
                magicBtn.textContent = 'LOADING...';
                magicBtn.style.background = '#27AE60';
                
                if (currentMessageType === 'text') {
                    woodFrame.setAttribute('visible', 'true');
                    textDisplay.setAttribute('visible', 'true');
                    videoScreen.setAttribute('visible', 'false');
                    imageDisplay.setAttribute('visible', 'false');
                    
                    videoControls.style.display = 'none';
                    magicBtn.style.display = 'none';
                    instructions.textContent = `Message from card: ${cardId}`;
                    
                } else if (currentMessageType === 'image') {
                    woodFrame.setAttribute('visible', 'true');
                    imageDisplay.setAttribute('visible', 'true');
                    videoScreen.setAttribute('visible', 'false');
                    textDisplay.setAttribute('visible', 'false');
                    
                    videoControls.style.display = 'none';
                    magicBtn.style.display = 'none';
                    instructions.textContent = `Image from card: ${cardId}`;
                    
                } else if (currentMessageType === 'video' || currentMessageType === 'audio') {
                    woodFrame.setAttribute('visible', 'true');
                    videoScreen.setAttribute('visible', 'true');
                    textDisplay.setAttribute('visible', 'false');
                    imageDisplay.setAttribute('visible', 'false');
                    
                    if (video) {
                        setupVideoHandlers();
                        
                        setTimeout(function() {
                            video.muted = false;
                            
                            video.play().then(function() {
                                magicBtn.style.display = 'none';
                                videoControls.style.display = 'block';
                                instructions.textContent = `Message from card: ${cardId}`;
                                
                            }).catch(function(error) {
                                showError('Cannot play media. Tap to try again.');
                                magicBtn.textContent = `▶ PLAY ${cardId}`;
                                magicBtn.style.background = '#E74C3C';
                                magicBtn.style.display = 'block';
                            });
                        }, 800);
                    }
                }
            });
            
            // Auto-play if we have data
            setTimeout(function() {
                loadData();
                
                if (cardId) {
                    setTimeout(() => {
                        magicBtn.click();
                    }, 1000);
                }
            }, 500);
            
            // For testing: If you want to see the URL with data
            // Uncomment this and open browser console:
            /*
            console.log('Current URL with data:', createUrlWithData(
                'TEST123', 
                'text', 
                'This is a test message that will work in ANY tab or device!'
            ));
            */
        });
    </script>
</body>
</html>
