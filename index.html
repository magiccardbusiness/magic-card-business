<!DOCTYPE html>
<html>
<head>
    <title>Magic Card</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: black; }
        #play-btn {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: #667eea; color: white; padding: 20px 40px;
            font-size: 20px; border: none; border-radius: 10px;
            cursor: pointer; z-index: 1000;
        }
        #info {
            position: fixed; top: 20px; left: 0; width: 100%;
            color: white; text-align: center; font-size: 18px; z-index: 1000;
        }
        .firebase-badge {
            position: fixed; top: 10px; right: 10px;
            background: #666; color: white; padding: 5px 10px;
            border-radius: 10px; font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="firebase-badge">☁️ Local Mode</div>
    <div id="info">🎴 Magic Card</div>
    <button id="play-btn">🎬 PLAY MAGIC</button>
    
    <a-scene embedded>
        <a-camera></a-camera>
        <a-light type="ambient" color="#FFFFFF" intensity="0.8"></a-light>
        
        <a-entity position="0 0 -2">
            <a-box id="frame" width="2.0" height="1.4" depth="0.08"
                   position="0 0.8 0" rotation="-10 0 0"
                   color="#8B7355" visible="false">
            </a-box>
            
            <a-text id="text" value="" color="#FFD700" align="center"
                    width="1.8" position="0 0.8 0.05" rotation="-10 0 0"
                    visible="false">
            </a-text>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const playBtn = document.getElementById('play-btn');
            const frame = document.getElementById('frame');
            const text = document.getElementById('text');
            const info = document.getElementById('info');
            
            // Get message from URL
            const hash = window.location.hash.substring(1);
            let message = "Welcome to Magic Card! ✨";
            let cardId = "DEMO";
            
            // Try to decode from hash (old format)
            if (hash) {
                try {
                    const data = JSON.parse(atob(hash));
                    message = data.message || message;
                    cardId = data.card || cardId;
                } catch (e) {
                    message = decodeURIComponent(hash);
                }
            }
            
            // Get from URL params (new format)
            const params = new URLSearchParams(window.location.search);
            const urlMessage = params.get('message');
            const urlCard = params.get('card');
            
            if (urlMessage) message = decodeURIComponent(urlMessage);
            if (urlCard) cardId = urlCard;
            
            // Update display
            text.setAttribute('value', message);
            info.textContent = `🎴 Card: ${cardId}`;
            playBtn.textContent = `🎬 PLAY ${cardId}`;
            
            // Play button
            playBtn.addEventListener('click', function() {
                frame.setAttribute('visible', 'true');
                text.setAttribute('visible', 'true');
                playBtn.style.display = 'none';
                info.textContent = `🎴 ${cardId}: ${message}`;
            });
            
            // Auto-play if we have data
            if (hash || urlMessage || urlCard) {
                setTimeout(() => {
                    if (playBtn.style.display !== 'none') {
                        playBtn.click();
                    }
                }, 1500);
            }
        });
    </script>
</body>
</html>
