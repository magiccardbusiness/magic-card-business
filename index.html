<!DOCTYPE html>
<html>
<head>
    <title>Magic Card</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; }
        body { 
            background: black; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        
        /* Company Logo */
        #company-logo {
            position: fixed;
            top: 25px;
            left: 0;
            width: 100%;
            color: white;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            z-index: 1000;
        }
        
        .magic-i {
            position: relative;
            display: inline-block;
            color: #FFD700;
        }
        
        .magic-i::before {
            content: "★";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #FFD700;
        }
        
        /* INSTRUCTIONS - UNDER LOGO */
        #instructions {
            position: fixed;
            top: 75px; /* RIGHT UNDER THE LOGO */
            left: 0;
            width: 100%;
            color: #AAAAAA;
            text-align: center;
            font-size: 14px;
            z-index: 1000;
            padding: 0 20px;
            line-height: 1.4;
        }
        
        #magic-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #2C3E50;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            z-index: 1001;
            cursor: pointer;
            border: 1px solid #34495E;
        }
        
        #video-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 15px;
            z-index: 1002;
            display: none;
            border-top: 1px solid #333;
        }
        
        #timeline-container {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
            margin-bottom: 14px;
            cursor: pointer;
        }
        
        #progress-bar {
            height: 100%;
            background: #FFD700;
            border-radius = "3px";
            width: 0%;
        }
        
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .time-display {
            color: #AAA;
            font-size: 13px;
            font-family: monospace;
            min-width: 80px;
        }
        
        .buttons-container {
            display: flex;
            gap: 8px;
        }
        
        .control-btn {
            background: #2C3E50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            min-width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        #play-pause-btn { background: #27AE60; }
        #stop-btn { background: #E74C3C; }
        #save-btn { background: #9B59B6; }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Card message display */
        #card-message {
            position: fixed;
            top: 120px;
            left: 0;
            width: 100%;
            color: #FFD700;
            text-align: center;
            font-size: 16px;
            z-index: 1003;
            padding: 0 20px;
            display: none;
        }
        
        /* Error message */
        #error-message {
            position: fixed;
            top: 150px;
            left: 0;
            width: 100%;
            color: #FF6B6B;
            text-align: center;
            font-size: 14px;
            z-index: 1004;
            padding: 0 20px;
            display: none;
        }
        
        /* Loading spinner */
        .spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #FFD700;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            z-index: 1005;
        }
        
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="company-logo">
        MAG<span class="magic-i">I</span>C CARD
    </div>
    
    <!-- Loading Spinner -->
    <div class="spinner" id="loading-spinner"></div>
    
    <!-- Instructions - DIRECTLY UNDER LOGO -->
    <div id="instructions">
        Point camera → Tap button for magic message
    </div>
    
    <!-- Card Message Display -->
    <div id="card-message"></div>
    
    <!-- Error Message Display -->
    <div id="error-message"></div>
    
    <button id="magic-btn">▶ PLAY MAGIC MESSAGE</button>
    
    <div id="video-controls">
        <div id="timeline-container">
            <div id="progress-bar"></div>
        </div>
        
        <div class="controls-row">
            <div class="time-display">
                <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
            </div>
            
            <div class="buttons-container">
                <button id="play-pause-btn" class="control-btn">
                    <span>⏸</span> <span>PAUSE</span>
                </button>
                <button id="stop-btn" class="control-btn">
                    <span>⏹</span> <span>STOP</span>
                </button>
                <button id="save-btn" class="control-btn">
                    <span>💾</span> <span>SAVE</span>
                </button>
            </div>
        </div>
    </div>
    
    <a-scene embedded>
        <a-camera></a-camera>
        <a-light type="ambient" color="#FFFFFF" intensity="0.8"></a-light>
        
        <!-- FRAME WITH ADJUSTED POSITION AND ROTATION -->
        <a-entity position="0 0 -2">
            <!-- Wooden Frame - TILTED and HIGHER -->
            <a-box id="wood-frame"
                   width="2.0" height="1.4" depth="0.08"
                   position="0 0.8 0"
                   rotation="-10 0 0"
                   color="#8B7355" roughness="0.7"
                   visible="false">
            </a-box>
            
            <!-- Video screen - SAME ADJUSTMENTS -->
            <a-plane id="video-screen"
                    width="1.85" height="1.25"
                    position="0 0.8 0.05"
                    rotation="-10 0 0"
                    material="side: double; color: #000000"
                    visible="false">
                <a-video id="ar-video"
                        width="1.85" height="1.25"
                        position="0 0 0.01">
                </a-video>
            </a-plane>
            
            <!-- Text Display (for text messages) -->
            <a-text id="text-display"
                    value=""
                    color="#FFFFFF"
                    align="center"
                    width="1.8"
                    position="0 0.8 0.05"
                    rotation="-10 0 0"
                    visible="false">
            </a-text>
            
            <!-- Image Display -->
            <a-image id="image-display"
                    width="1.85" height="1.25"
                    position="0 0.8 0.05"
                    rotation="-10 0 0"
                    visible="false">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const magicBtn = document.getElementById('magic-btn');
            const woodFrame = document.getElementById('wood-frame');
            const videoScreen = document.getElementById('video-screen');
            const textDisplay = document.getElementById('text-display');
            const imageDisplay = document.getElementById('image-display');
            const videoControls = document.getElementById('video-controls');
            const progressBar = document.getElementById('progress-bar');
            const currentTimeEl = document.getElementById('current-time');
            const totalTimeEl = document.getElementById('total-time');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const stopBtn = document.getElementById('stop-btn');
            const saveBtn = document.getElementById('save-btn');
            const timelineContainer = document.getElementById('timeline-container');
            const instructions = document.getElementById('instructions');
            const cardMessageDiv = document.getElementById('card-message');
            const errorMessageDiv = document.getElementById('error-message');
            const loadingSpinner = document.getElementById('loading-spinner');
            
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('card');
            
            let video = null;
            let currentMessageType = 'text'; // Default to text
            let currentMessageContent = '';
            
            // 🔥🔥🔥 **FIX 1: GET MESSAGE FROM LOCALSTORAGE + URL PARAMS** 🔥🔥🔥
            function getMessageData() {
                // Try to get from URL parameters first
                const urlType = urlParams.get('type');
                const urlMessage = urlParams.get('message');
                
                if (urlType && urlMessage) {
                    // Save to localStorage for future use
                    localStorage.setItem(`magicCard_${cardId}_type`, urlType);
                    localStorage.setItem(`magicCard_${cardId}_message`, decodeURIComponent(urlMessage));
                    
                    return {
                        type: urlType,
                        content: decodeURIComponent(urlMessage)
                    };
                }
                
                // If no URL params, try localStorage
                const storedType = localStorage.getItem(`magicCard_${cardId}_type`);
                const storedMessage = localStorage.getItem(`magicCard_${cardId}_message`);
                
                if (storedType && storedMessage) {
                    return {
                        type: storedType,
                        content: storedMessage
                    };
                }
                
                // If nothing found, return null
                return null;
            }
            
            // 🔥🔥🔥 **FIX 2: LOAD MESSAGE ON PAGE LOAD** 🔥🔥🔥
            function loadMessage() {
                loadingSpinner.style.display = 'block';
                magicBtn.disabled = true;
                
                if (!cardId) {
                    showError('No card ID found. Please scan a valid QR code.');
                    loadingSpinner.style.display = 'none';
                    magicBtn.disabled = false;
                    return;
                }
                
                const messageData = getMessageData();
                
                if (!messageData) {
                    showError('No message found for this card. The sender needs to upload a message first.');
                    loadingSpinner.style.display = 'none';
                    magicBtn.disabled = false;
                    magicBtn.textContent = 'NO MESSAGE FOUND';
                    magicBtn.style.background = '#E74C3C';
                    return;
                }
                
                currentMessageType = messageData.type;
                currentMessageContent = messageData.content;
                
                // Update UI
                cardMessageDiv.textContent = `Card: ${cardId}`;
                cardMessageDiv.style.display = 'block';
                instructions.textContent = "Point camera at card → View special message";
                magicBtn.textContent = `▶ PLAY ${cardId} MESSAGE`;
                
                // Setup the message based on type
                setupMessage();
                
                loadingSpinner.style.display = 'none';
                magicBtn.disabled = false;
            }
            
            function setupMessage() {
                // Clear previous video if exists
                if (video) {
                    video.remove();
                    video = null;
                }
                
                if (currentMessageType === 'text') {
                    // Setup for text message
                    textDisplay.setAttribute('value', currentMessageContent);
                    console.log('Text message loaded:', currentMessageContent.substring(0, 50) + '...');
                    
                } else if (currentMessageType === 'video' || currentMessageType === 'audio') {
                    // Setup for video/audio
                    video = document.createElement('video');
                    video.id = 'message-video';
                    
                    if (currentMessageContent && currentMessageContent.startsWith('http')) {
                        video.src = currentMessageContent;
                        video.crossOrigin = 'anonymous';
                    } else if (currentMessageType === 'video') {
                        video.src = 'https://res.cloudinary.com/diqa9qyvh/video/upload/v1767377987/20251219_010742000_iOS_xuandm.mp4';
                        video.crossOrigin = 'anonymous';
                    } else {
                        video.src = 'https://assets.mixkit.co/music/preview/mixkit-driving-ambition-32.mp4';
                        video.crossOrigin = 'anonymous';
                    }
                    
                    video.loop = true;
                    video.playsInline = true;
                    video.preload = 'auto';
                    video.muted = true;
                    document.body.appendChild(video);
                    
                    console.log('Video/Audio loaded:', video.src);
                    
                    // Connect to A-Frame
                    const arVideo = document.getElementById('ar-video');
                    if (arVideo) {
                        arVideo.setAttribute('src', '#message-video');
                    }
                    
                } else if (currentMessageType === 'image') {
                    // Setup for image
                    if (currentMessageContent && currentMessageContent.startsWith('http')) {
                        imageDisplay.setAttribute('src', currentMessageContent);
                        console.log('Image loaded:', currentMessageContent);
                    }
                }
            }
            
            // Wait for A-Frame scene to load
            const scene = document.querySelector('a-scene');
            
            scene.addEventListener('loaded', function() {
                console.log('A-Frame scene loaded');
                loadMessage(); // Load message after scene is ready
            });
            
            // Format time
            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }
            
            // Update timeline
            function updateVideoProgress() {
                if (video && video.duration) {
                    const percent = (video.currentTime / video.duration) * 100;
                    progressBar.style.width = percent + '%';
                    currentTimeEl.textContent = formatTime(video.currentTime);
                }
            }
            
            // Show error message
            function showError(message) {
                errorMessageDiv.textContent = message;
                errorMessageDiv.style.display = 'block';
                console.error('Error:', message);
            }
            
            // Video error handling
            function setupVideoHandlers() {
                if (!video) return;
                
                video.addEventListener('error', function(e) {
                    showError('Media cannot load. Check your connection.');
                    magicBtn.textContent = '⚠ ERROR - TRY AGAIN';
                    magicBtn.style.background = '#E74C3C';
                });
                
                video.addEventListener('timeupdate', updateVideoProgress);
                
                video.addEventListener('loadedmetadata', function() {
                    if (video.duration) {
                        totalTimeEl.textContent = formatTime(video.duration);
                    }
                });
            }
            
            // Click timeline to seek
            timelineContainer.addEventListener('click', function(e) {
                if (video && video.duration) {
                    const rect = this.getBoundingClientRect();
                    const percent = (e.clientX - rect.left) / rect.width;
                    video.currentTime = percent * video.duration;
                    updateVideoProgress();
                }
            });
            
            // Play/Pause button
            playPauseBtn.addEventListener('click', function() {
                if (!video) return;
                
                if (video.paused) {
                    video.play().then(() => {
                        playPauseBtn.innerHTML = '<span>⏸</span> <span>PAUSE</span>';
                        playPauseBtn.style.background = '#27AE60';
                        errorMessageDiv.style.display = 'none';
                    }).catch(error => {
                        showError('Cannot play media. Try again.');
                    });
                } else {
                    video.pause();
                    playPauseBtn.innerHTML = '<span>▶</span> <span>PLAY</span>';
                    playPauseBtn.style.background = '#3498DB';
                }
            });
            
            // Stop button
            stopBtn.addEventListener('click', function() {
                if (!video) return;
                
                video.pause();
                video.currentTime = 0;
                playPauseBtn.innerHTML = '<span>▶</span> <span>PLAY</span>';
                playPauseBtn.style.background = '#3498DB';
                updateVideoProgress();
            });
            
            // Save button
            saveBtn.addEventListener('click', function() {
                if (!video || !video.src) return;
                
                const a = document.createElement('a');
                a.href = video.src;
                a.download = `Magic-Card-${cardId || 'Message'}.mp4`;
                
                const originalHTML = saveBtn.innerHTML;
                saveBtn.innerHTML = '<span>⏳</span> <span>SAVING...</span>';
                saveBtn.style.background = '#FF9800';
                saveBtn.disabled = true;
                
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                setTimeout(() => {
                    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                    
                    if (isIOS) {
                        alert('📱 To save to Photos:\n1. Open Files app\n2. Find the video\n3. Tap Share → Save Video');
                    } else {
                        alert('✅ Video saved! Check Downloads folder.');
                    }
                    
                    saveBtn.innerHTML = originalHTML;
                    saveBtn.style.background = '#9B59B6';
                    saveBtn.disabled = false;
                }, 1500);
            });
            
            // MAGIC BUTTON - Main trigger
            magicBtn.addEventListener('click', function() {
                magicBtn.textContent = 'LOADING...';
                magicBtn.style.background = '#27AE60';
                errorMessageDiv.style.display = 'none';
                
                if (currentMessageType === 'text') {
                    // Show text frame
                    if (woodFrame) woodFrame.setAttribute('visible', 'true');
                    textDisplay.setAttribute('visible', 'true');
                    if (videoScreen) videoScreen.setAttribute('visible', 'false');
                    if (imageDisplay) imageDisplay.setAttribute('visible', 'false');
                    
                    videoControls.style.display = 'none';
                    magicBtn.style.display = 'none';
                    
                    instructions.textContent = `Reading message from card: ${cardId || 'your card'}`;
                    
                } else if (currentMessageType === 'image') {
                    // Show image frame
                    if (woodFrame) woodFrame.setAttribute('visible', 'true');
                    if (imageDisplay) imageDisplay.setAttribute('visible', 'true');
                    if (videoScreen) videoScreen.setAttribute('visible', 'false');
                    if (textDisplay) textDisplay.setAttribute('visible', 'false');
                    
                    videoControls.style.display = 'none';
                    magicBtn.style.display = 'none';
                    
                    instructions.textContent = `Viewing image from card: ${cardId || 'your card'}`;
                    
                } else if (currentMessageType === 'video' || currentMessageType === 'audio') {
                    // Show video frame
                    if (woodFrame) woodFrame.setAttribute('visible', 'true');
                    if (videoScreen) videoScreen.setAttribute('visible', 'true');
                    if (textDisplay) textDisplay.setAttribute('visible', 'false');
                    if (imageDisplay) imageDisplay.setAttribute('visible', 'false');
                    
                    if (video) {
                        setupVideoHandlers();
                        
                        setTimeout(function() {
                            video.muted = false;
                            
                            video.play().then(function() {
                                magicBtn.style.display = 'none';
                                videoControls.style.display = 'block';
                                instructions.textContent = `Viewing message from card: ${cardId || 'your card'}`;
                                
                                if (video.duration && totalTimeEl.textContent === '0:00') {
                                    totalTimeEl.textContent = formatTime(video.duration);
                                }
                                
                            }).catch(function(error) {
                                showError('Cannot play media. Try again or check connection.');
                                magicBtn.textContent = cardId ? `▶ PLAY ${cardId}` : '▶ PLAY MAGIC MESSAGE';
                                magicBtn.style.background = '#E74C3C';
                                magicBtn.style.display = 'block';
                            });
                        }, 800);
                    }
                }
            });
            
            // Help with iOS audio
            document.addEventListener('click', function initAudio() {
                if (video && video.paused) {
                    video.muted = false;
                }
                document.removeEventListener('click', initAudio);
            });
            
            // If cardId exists, auto-play after 1 second
            if (cardId) {
                setTimeout(() => {
                    if (magicBtn.textContent.includes('PLAY')) {
                        magicBtn.click();
                    }
                }, 1000);
            }
        });
    </script>
</body>
</html>
