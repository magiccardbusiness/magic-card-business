<!DOCTYPE html>
<html>
<head>
    <title>Magic Card AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; }
        body { 
            background: black; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        
        /* Company Logo - YOUR BEAUTIFUL LOGO */
        #company-logo {
            position: fixed;
            top: 25px;
            left: 0;
            width: 100%;
            color: white;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            z-index: 1000;
        }
        
        .magic-i {
            position: relative;
            display: inline-block;
            color: #FFD700;
        }
        
        .magic-i::before {
            content: "★";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #FFD700;
        }
        
        /* INSTRUCTIONS - UNDER LOGO */
        #instructions {
            position: fixed;
            top: 75px;
            left: 0;
            width: 100%;
            color: #AAAAAA;
            text-align: center;
            font-size: 14px;
            z-index: 1000;
            padding: 0 20px;
            line-height: 1.4;
        }
        
        /* Card ID Display - NEW */
        #card-id-display {
            position: fixed;
            top: 100px;
            left: 0;
            width: 100%;
            color: #FFD700;
            text-align: center;
            font-size: 14px;
            z-index: 1001;
            display: none;
        }
        
        /* Connection Status - NEW */
        #connection-status {
            position: fixed;
            top: 120px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #28a745;
            z-index: 1002;
        }
        
        #magic-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #2C3E50;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            z-index: 1003;
            cursor: pointer;
            border: 1px solid #34495E;
            transition: all 0.3s;
        }
        
        #magic-btn:hover {
            background: #34495E;
            transform: translateX(-50%) translateY(-2px);
        }
        
        #magic-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #video-controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 15px;
            z-index: 1004;
            display: none;
            border-top: 1px solid #333;
        }
        
        #timeline-container {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
            margin-bottom: 14px;
            cursor: pointer;
        }
        
        #progress-bar {
            height: 100%;
            background: #FFD700;
            border-radius: 3px;
            width: 0%;
        }
        
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .time-display {
            color: #AAA;
            font-size: 13px;
            font-family: monospace;
            min-width: 80px;
        }
        
        .buttons-container {
            display: flex;
            gap: 8px;
        }
        
        .control-btn {
            background: #2C3E50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            min-width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.3s;
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
        }
        
        #play-pause-btn { background: #27AE60; }
        #stop-btn { background: #E74C3C; }
        #save-btn { background: #9B59B6; }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Card message display */
        #card-message {
            position: fixed;
            top: 140px;
            left: 0;
            width: 100%;
            color: #FFD700;
            text-align: center;
            font-size: 16px;
            z-index: 1005;
            padding: 0 20px;
            display: none;
        }
        
        /* Error message */
        #error-message {
            position: fixed;
            top: 160px;
            left: 0;
            width: 100%;
            color: #FF6B6B;
            text-align: center;
            font-size: 14px;
            z-index: 1006;
            padding: 0 20px;
            display: none;
        }
        
        /* Loading spinner */
        .spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #FFD700;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            z-index: 1007;
        }
        
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        /* Share Button - NEW */
        #share-btn {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            border: 1px solid #FFD700;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            z-index: 1008;
            display: none;
        }
        
        #share-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: translateX(-50%) translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- YOUR BEAUTIFUL LOGO -->
    <div id="company-logo">
        MAG<span class="magic-i">I</span>C CARD
    </div>
    
    <!-- Loading Spinner -->
    <div class="spinner" id="loading-spinner"></div>
    
    <!-- Instructions -->
    <div id="instructions">
        Loading magic...
    </div>
    
    <!-- Card ID Display -->
    <div id="card-id-display"></div>
    
    <!-- Connection Status -->
    <div id="connection-status"></div>
    
    <!-- Card Message Display -->
    <div id="card-message"></div>
    
    <!-- Error Message Display -->
    <div id="error-message"></div>
    
    <!-- Share Button -->
    <button id="share-btn">
        <span>📤</span> SHARE THIS CARD
    </button>
    
    <!-- Magic Button -->
    <button id="magic-btn">LOADING...</button>
    
    <!-- Video Controls -->
    <div id="video-controls">
        <div id="timeline-container">
            <div id="progress-bar"></div>
        </div>
        
        <div class="controls-row">
            <div class="time-display">
                <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
            </div>
            
            <div class="buttons-container">
                <button id="play-pause-btn" class="control-btn">
                    <span>⏸</span> <span>PAUSE</span>
                </button>
                <button id="stop-btn" class="control-btn">
                    <span>⏹</span> <span>STOP</span>
                </button>
                <button id="save-btn" class="control-btn">
                    <span>💾</span> <span>SAVE</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- A-FRAME SCENE -->
    <a-scene embedded>
        <a-camera></a-camera>
        <a-light type="ambient" color="#FFFFFF" intensity="0.8"></a-light>
        
        <a-entity position="0 0 -2">
            <!-- Wooden Frame -->
            <a-box id="wood-frame"
                   width="2.0" height="1.4" depth="0.08"
                   position="0 0.8 0"
                   rotation="-10 0 0"
                   color="#8B7355" roughness="0.7"
                   visible="false">
            </a-box>
            
            <!-- Video screen -->
            <a-plane id="video-screen"
                    width="1.85" height="1.25"
                    position="0 0.8 0.05"
                    rotation="-10 0 0"
                    material="side: double; color: #000000"
                    visible="false">
                <a-video id="ar-video"
                        width="1.85" height="1.25"
                        position="0 0 0.01">
                </a-video>
            </a-plane>
            
            <!-- Text Display -->
            <a-text id="text-display"
                    value=""
                    color="#FFFFFF"
                    align="center"
                    width="1.8"
                    position="0 0.8 0.05"
                    rotation="-10 0 0"
                    visible="false">
            </a-text>
            
            <!-- Image Display -->
            <a-image id="image-display"
                    width="1.85" height="1.25"
                    position="0 0.8 0.05"
                    rotation="-10 0 0"
                    visible="false">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get all elements
            const magicBtn = document.getElementById('magic-btn');
            const woodFrame = document.getElementById('wood-frame');
            const videoScreen = document.getElementById('video-screen');
            const textDisplay = document.getElementById('text-display');
            const imageDisplay = document.getElementById('image-display');
            const videoControls = document.getElementById('video-controls');
            const progressBar = document.getElementById('progress-bar');
            const currentTimeEl = document.getElementById('current-time');
            const totalTimeEl = document.getElementById('total-time');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const stopBtn = document.getElementById('stop-btn');
            const saveBtn = document.getElementById('save-btn');
            const timelineContainer = document.getElementById('timeline-container');
            const instructions = document.getElementById('instructions');
            const cardMessageDiv = document.getElementById('card-message');
            const errorMessageDiv = document.getElementById('error-message');
            const loadingSpinner = document.getElementById('loading-spinner');
            const cardIdDisplay = document.getElementById('card-id-display');
            const connectionStatus = document.getElementById('connection-status');
            const shareBtn = document.getElementById('share-btn');
            
            // Variables
            let video = null;
            let currentMessageType = null;
            let currentMessageContent = '';
            let cardId = '';
            let fallbackData = null;
            
            // ======================
            // 1. GET DATA FROM URL
            // ======================
            function getCardIdFromUrl() {
                // Try new format: ?card=CARD123&message=Hello
                const urlParams = new URLSearchParams(window.location.search);
                const cardIdFromParam = urlParams.get('card');
                const messageFromParam = urlParams.get('message');
                
                if (cardIdFromParam || messageFromParam) {
                    return {
                        id: cardIdFromParam || 'PERSONAL',
                        message: messageFromParam ? decodeURIComponent(messageFromParam) : '',
                        isNewFormat: true
                    };
                }
                
                // Try old format: #BASE64_DATA
                const hash = window.location.hash.substring(1);
                if (!hash) {
                    return null;
                }
                
                try {
                    const decoded = atob(hash);
                    const data = JSON.parse(decoded);
                    return {
                        id: data.card || 'MAGIC',
                        message: data.message || '',
                        isNewFormat: false,
                        data: data
                    };
                } catch (error) {
                    // If not JSON, use hash as message
                    return {
                        id: 'URL',
                        message: decodeURIComponent(hash),
                        isNewFormat: false
                    };
                }
            }
            
            // ======================
            // 2. LOAD MESSAGE
            // ======================
            function loadMessage() {
                console.log("🎴 Loading magic message...");
                loadingSpinner.style.display = 'block';
                magicBtn.disabled = true;
                instructions.textContent = "Decoding magic...";
                
                const cardInfo = getCardIdFromUrl();
                
                if (!cardInfo) {
                    // No message in URL - show demo
                    console.log("📭 No URL data, showing demo");
                    showDemo();
                    return;
                }
                
                // We have a message!
                cardId = cardInfo.id;
                currentMessageContent = cardInfo.message;
                fallbackData = cardInfo.data;
                
                // Determine message type
                if (cardInfo.data && cardInfo.data.type) {
                    currentMessageType = cardInfo.data.type;
                } else if (currentMessageContent.match(/\.(jpg|jpeg|png|gif)$/i)) {
                    currentMessageType = 'image';
                } else if (currentMessageContent.match(/\.(mp4|webm|mov)$/i)) {
                    currentMessageType = 'video';
                } else if (currentMessageContent.match(/\.(mp3|wav|ogg)$/i)) {
                    currentMessageType = 'audio';
                } else {
                    currentMessageType = 'text';
                }
                
                console.log("📦 Loaded:", { cardId, type: currentMessageType, message: currentMessageContent.substring(0, 50) + '...' });
                
                // Update UI
                cardIdDisplay.textContent = `Card: ${cardId}`;
                cardIdDisplay.style.display = 'block';
                
                connectionStatus.textContent = "✅ Message loaded";
                connectionStatus.style.color = "#28a745";
                
                instructions.textContent = "Point camera → Tap button for magic";
                magicBtn.textContent = `▶ PLAY ${cardId} MESSAGE`;
                magicBtn.style.background = '#27AE60';
                
                // Show share button
                shareBtn.style.display = 'block';
                
                // Setup the message
                setupMessage();
                
                loadingSpinner.style.display = 'none';
                magicBtn.disabled = false;
                
                // Auto-play in 2 seconds
                setTimeout(() => {
                    if (magicBtn.textContent.includes('PLAY')) {
                        magicBtn.click();
                    }
                }, 2000);
            }
            
            // ======================
            // 3. DEMO MODE
            // ======================
            function showDemo() {
                console.log("🎭 Showing demo mode");
                cardId = 'DEMO';
                currentMessageType = 'text';
                currentMessageContent = 'Welcome to Magic Card! ✨\nScan a QR code to see a real message.';
                
                cardIdDisplay.textContent = `Demo Mode`;
                cardIdDisplay.style.display = 'block';
                
                connectionStatus.textContent = "✨ Try a Magic Card QR code!";
                connectionStatus.style.color = "#FFD700";
                
                instructions.textContent = "Point camera → Tap button for demo";
                magicBtn.textContent = '▶ PLAY DEMO';
                magicBtn.style.background = '#F39C12';
                
                setupMessage();
                
                loadingSpinner.style.display = 'none';
                magicBtn.disabled = false;
            }
            
            // ======================
            // 4. SETUP MESSAGE
            // ======================
            function setupMessage() {
                console.log("🛠️ Setting up message type:", currentMessageType);
                
                // Clean up previous video
                if (video) {
                    video.remove();
                    video = null;
                }
                
                if (currentMessageType === 'text') {
                    textDisplay.setAttribute('value', currentMessageContent || 'Hello from Magic Card!');
                    
                } else if (currentMessageType === 'video' || currentMessageType === 'audio') {
                    video = document.createElement('video');
                    video.id = 'message-video';
                    video.loop = true;
                    video.playsInline = true;
                    video.preload = 'auto';
                    video.muted = true;
                    
                    // Set video source
                    if (currentMessageContent && currentMessageContent.startsWith('http')) {
                        video.src = currentMessageContent;
                        video.crossOrigin = 'anonymous';
                    } else if (fallbackData && fallbackData.message && fallbackData.message.startsWith('http')) {
                        video.src = fallbackData.message;
                        video.crossOrigin = 'anonymous';
                    } else if (currentMessageType === 'video') {
                        // Default demo video
                        video.src = 'https://res.cloudinary.com/diqa9qyvh/video/upload/v1767377987/20251219_010742000_iOS_xuandm.mp4';
                        video.crossOrigin = 'anonymous';
                    } else {
                        // Default demo audio
                        video.src = 'https://assets.mixkit.co/music/preview/mixkit-driving-ambition-32.mp4';
                        video.crossOrigin = 'anonymous';
                    }
                    
                    document.body.appendChild(video);
                    
                    // Connect to A-Frame
                    const arVideo = document.getElementById('ar-video');
                    if (arVideo) {
                        arVideo.setAttribute('src', '#message-video');
                    }
                    
                } else if (currentMessageType === 'image') {
                    if (currentMessageContent) {
                        imageDisplay.setAttribute('src', currentMessageContent);
                    } else if (fallbackData && fallbackData.message) {
                        imageDisplay.setAttribute('src', fallbackData.message);
                    }
                }
                
                console.log("✅ Message setup complete");
            }
            
            // ======================
            // 5. ERROR HANDLING
            // ======================
            function showError(message) {
                errorMessageDiv.textContent = message;
                errorMessageDiv.style.display = 'block';
                setTimeout(() => {
                    errorMessageDiv.style.display = 'none';
                }, 5000);
            }
            
            // ======================
            // 6. TIME FORMATTING
            // ======================
            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }
            
            // ======================
            // 7. VIDEO CONTROLS
            // ======================
            function updateVideoProgress() {
                if (video && video.duration) {
                    const percent = (video.currentTime / video.duration) * 100;
                    progressBar.style.width = percent + '%';
                    currentTimeEl.textContent = formatTime(video.currentTime);
                }
            }
            
            function setupVideoHandlers() {
                if (!video) return;
                
                video.addEventListener('error', function(e) {
                    console.error("❌ Video error:", e);
                    showError('Media cannot load. Try again.');
                });
                
                video.addEventListener('timeupdate', updateVideoProgress);
                
                video.addEventListener('loadedmetadata', function() {
                    if (video.duration) {
                        totalTimeEl.textContent = formatTime(video.duration);
                    }
                });
            }
            
            // ======================
            // 8. EVENT LISTENERS
            // ======================
            
            // Timeline click to seek
            timelineContainer.addEventListener('click', function(e) {
                if (video && video.duration) {
                    const rect = this.getBoundingClientRect();
                    const percent = (e.clientX - rect.left) / rect.width;
                    video.currentTime = percent * video.duration;
                    updateVideoProgress();
                }
            });
            
            // Play/Pause button
            playPauseBtn.addEventListener('click', function() {
                if (!video) return;
                
                if (video.paused) {
                    video.play().then(() => {
                        playPauseBtn.innerHTML = '<span>⏸</span> <span>PAUSE</span>';
                        playPauseBtn.style.background = '#27AE60';
                    }).catch(error => {
                        console.error("❌ Play failed:", error);
                        showError('Cannot play media. Try again.');
                    });
                } else {
                    video.pause();
                    playPauseBtn.innerHTML = '<span>▶</span> <span>PLAY</span>';
                    playPauseBtn.style.background = '#3498DB';
                }
            });
            
            // Stop button
            stopBtn.addEventListener('click', function() {
                if (!video) return;
                
                video.pause();
                video.currentTime = 0;
                playPauseBtn.innerHTML = '<span>▶</span> <span>PLAY</span>';
                playPauseBtn.style.background = '#3498DB';
                updateVideoProgress();
            });
            
            // Save button
            saveBtn.addEventListener('click', function() {
                if (!video || !video.src) return;
                
                const a = document.createElement('a');
                a.href = video.src;
                a.download = `Magic-Card-${cardId || 'Message'}.mp4`;
                
                const originalHTML = saveBtn.innerHTML;
                saveBtn.innerHTML = '<span>⏳</span> <span>SAVING...</span>';
                saveBtn.style.background = '#FF9800';
                saveBtn.disabled = true;
                
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                setTimeout(() => {
                    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                    
                    if (isIOS) {
                        alert('📱 To save to Photos:\n1. Open Files app\n2. Find the video\n3. Tap Share → Save Video');
                    } else {
                        alert('✅ Video saved! Check Downloads folder.');
                    }
                    
                    saveBtn.innerHTML = originalHTML;
                    saveBtn.style.background = '#9B59B6';
                    saveBtn.disabled = false;
                }, 1500);
            });
            
            // Share button
            shareBtn.addEventListener('click', function() {
                const shareUrl = window.location.href;
                const shareText = `Check out this Magic Card from ${cardId}!`;
                
                if (navigator.share) {
                    navigator.share({
                        title: 'Magic Card',
                        text: shareText,
                        url: shareUrl
                    });
                } else {
                    navigator.clipboard.writeText(shareUrl).then(() => {
                        showError('✅ Link copied to clipboard!');
                    });
                }
            });
            
            // ======================
            // 9. MAGIC BUTTON - MAIN TRIGGER
            // ======================
            magicBtn.addEventListener('click', function() {
                console.log("🎯 Magic button clicked for:", cardId);
                magicBtn.textContent = 'LOADING...';
                magicBtn.style.background = '#27AE60';
                errorMessageDiv.style.display = 'none';
                
                if (currentMessageType === 'text') {
                    woodFrame.setAttribute('visible', 'true');
                    textDisplay.setAttribute('visible', 'true');
                    videoScreen.setAttribute('visible', 'false');
                    imageDisplay.setAttribute('visible', 'false');
                    
                    videoControls.style.display = 'none';
                    magicBtn.style.display = 'none';
                    shareBtn.style.display = 'none';
                    instructions.textContent = `✨ Message from ${cardId}`;
                    
                } else if (currentMessageType === 'image') {
                    woodFrame.setAttribute('visible', 'true');
                    imageDisplay.setAttribute('visible', 'true');
                    videoScreen.setAttribute('visible', 'false');
                    textDisplay.setAttribute('visible', 'false');
                    
                    videoControls.style.display = 'none';
                    magicBtn.style.display = 'none';
                    shareBtn.style.display = 'none';
                    instructions.textContent = `🖼️ Image from ${cardId}`;
                    
                } else if (currentMessageType === 'video' || currentMessageType === 'audio') {
                    woodFrame.setAttribute('visible', 'true');
                    videoScreen.setAttribute('visible', 'true');
                    textDisplay.setAttribute('visible', 'false');
                    imageDisplay.setAttribute('visible', 'false');
                    
                    if (video) {
                        setupVideoHandlers();
                        
                        setTimeout(function() {
                            video.muted = false;
                            
                            video.play().then(function() {
                                magicBtn.style.display = 'none';
                                shareBtn.style.display = 'none';
                                videoControls.style.display = 'block';
                                instructions.textContent = `🎬 ${currentMessageType === 'video' ? 'Video' : 'Audio'} from ${cardId}`;
                                
                                if (video.duration && totalTimeEl.textContent === '0:00') {
                                    totalTimeEl.textContent = formatTime(video.duration);
                                }
                                
                            }).catch(function(error) {
                                console.error("❌ Video play failed:", error);
                                showError('Cannot play media. Tap to try again.');
                                magicBtn.textContent = `▶ PLAY ${cardId}`;
                                magicBtn.style.background = '#E74C3C';
                                magicBtn.style.display = 'block';
                            });
                        }, 800);
                    }
                }
            });
            
            // ======================
            // 10. INITIALIZE
            // ======================
            console.log("🚀 Initializing Magic Card...");
            setTimeout(function() {
                loadMessage();
            }, 1000);
        });
    </script>
</body>
</html>
