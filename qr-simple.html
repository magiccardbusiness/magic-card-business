<!DOCTYPE html>
<html>
<head>
    <title>Magic Card - QR Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .logo .magic-i {
            color: #FFD700;
            position: relative;
            display: inline-block;
        }
        
        .logo .magic-i::before {
            content: "★";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
        }
        
        .tagline {
            color: #666;
            font-size: 16px;
        }
        
        h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #444;
            font-size: 14px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            -webkit-appearance: none;
            appearance: none;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .file-upload {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background: #f0f4ff;
            cursor: pointer;
        }
        
        .file-label {
            color: #667eea;
            font-size: 16px;
            display: block;
        }
        
        .preview {
            margin-top: 15px;
            display: none;
            text-align: center;
        }
        
        .preview video, .preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid #667eea;
        }
        
        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        .generate-btn:active {
            opacity: 0.9;
        }
        
        #qrcode {
            margin: 20px auto;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 2px solid #e9ecef;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .result-url {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            word-break: break-all;
            font-size: 13px;
            margin-top: 15px;
            border: 1px solid #dee2e6;
        }
        
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .video-note {
            background: #e8f4fd;
            border: 1px solid #b3d9ff;
            color: #004085;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">MAG<span class="magic-i">I</span>C CARD</div>
            <div class="tagline">Create AR messages for your cards</div>
        </div>
        
        <div class="form-group">
            <label for="cardId">Card ID:</label>
            <input type="text" id="cardId" placeholder="BIRTHDAY001" value="TEST123">
        </div>
        
        <div class="form-group">
            <label for="messageType">Message Type:</label>
            <select id="messageType">
                <option value="text">Text</option>
                <option value="video">Video</option>
                <option value="image">Image</option>
            </select>
        </div>
        
        <div class="form-group" id="textInput">
            <label for="messageText">Your Message:</label>
            <textarea id="messageText">🎉 Happy Birthday! 🎂</textarea>
        </div>
        
        <div class="form-group" id="mediaInput" style="display: none;">
            <div class="file-upload" onclick="document.getElementById('fileInput').click()">
                <div class="file-label">
                    📱 Tap to upload video/image
                </div>
                <input type="file" id="fileInput" accept="video/*,image/*" style="display: none;">
            </div>
            
            <div class="video-note">
                ⚠ For testing: Use SHORT videos (under 10 seconds)<br>
                ⚠ Only works on THIS device for testing
            </div>
            
            <div class="preview" id="mediaPreview"></div>
        </div>
        
        <button class="generate-btn" onclick="generateQRCode()">
            🪄 GENERATE QR CODE
        </button>
        
        <div id="status" class="status"></div>
        
        <h2 style="margin-top: 30px;">Your QR Code</h2>
        
        <div id="qrcode">
            QR code will appear here
        </div>
        
        <div class="result-url" id="resultUrl">
            URL will appear here
        </div>
    </div>

    <script>
        // Get elements
        const messageTypeSelect = document.getElementById('messageType');
        const textInput = document.getElementById('textInput');
        const mediaInput = document.getElementById('mediaInput');
        const fileInput = document.getElementById('fileInput');
        const mediaPreview = document.getElementById('mediaPreview');
        const statusDiv = document.getElementById('status');
        const qrcodeDiv = document.getElementById('qrcode');
        const resultUrlDiv = document.getElementById('resultUrl');
        
        let uploadedFileUrl = '';
        let currentQRCode = null;
        
        // Show/hide inputs
        messageTypeSelect.addEventListener('change', function() {
            const type = this.value;
            
            if (type === 'text') {
                textInput.style.display = 'block';
                mediaInput.style.display = 'none';
            } else {
                textInput.style.display = 'none';
                mediaInput.style.display = 'block';
            }
            
            mediaPreview.style.display = 'none';
            uploadedFileUrl = '';
        });
        
        // Handle file upload - SIMPLIFIED for mobile
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            console.log("File selected:", file.name, file.size, "bytes");
            
            // Show immediate preview
            mediaPreview.style.display = 'block';
            mediaPreview.innerHTML = 'Loading preview...';
            
            // Create object URL instead of Data URL (faster, less memory)
            const objectUrl = URL.createObjectURL(file);
            
            if (file.type.startsWith('video/')) {
                mediaPreview.innerHTML = `
                    <video controls style="max-width: 100%; max-height: 200px;">
                        <source src="${objectUrl}" type="${file.type}">
                    </video>
                    <br><small>${file.name} (${formatFileSize(file.size)})</small>
                `;
                uploadedFileUrl = objectUrl; // Use object URL instead of data URL
            } else if (file.type.startsWith('image/')) {
                mediaPreview.innerHTML = `
                    <img src="${objectUrl}" style="max-width: 100%; max-height: 200px;">
                    <br><small>${file.name} (${formatFileSize(file.size)})</small>
                `;
                uploadedFileUrl = objectUrl;
            }
            
            showStatus(`✅ ${file.type.startsWith('video/') ? 'Video' : 'Image'} loaded`, 'success');
        });
        
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        // 🔥 **SIMPLIFIED GENERATE FUNCTION - WORKS ON PHONE** 🔥
        function generateQRCode() {
            console.log("Generate button clicked!");
            
            const cardId = document.getElementById('cardId').value.trim() || 'TEST123';
            const messageType = messageTypeSelect.value;
            let messageContent = '';
            
            // Get message content
            if (messageType === 'text') {
                messageContent = document.getElementById('messageText').value.trim();
                if (!messageContent) {
                    showStatus('❌ Please enter a message', 'error');
                    return;
                }
            } else {
                if (!uploadedFileUrl) {
                    showStatus('❌ Please upload a file', 'error');
                    return;
                }
                
                // For mobile testing, we'll use a SIMPLER approach
                if (messageType === 'video') {
                    // For testing, use a short placeholder message
                    messageContent = "VIDEO_UPLOADED_" + Date.now();
                    showStatus('⚠ Video uploaded locally. For real cards, use Cloudinary.', 'warning');
                } else {
                    messageContent = uploadedFileUrl;
                }
            }
            
            // Use your Vercel URL
            const arPageUrl = "https://magic-card-business.vercel.app/";
            
            // Create SIMPLE data object
            const messageData = {
                card: cardId,
                type: messageType,
                message: messageType === 'video' ? "LOCAL_VIDEO_TEST" : messageContent
            };
            
            // Convert to Base64
            const jsonString = JSON.stringify(messageData);
            console.log("Data to encode length:", jsonString.length);
            
            // Check if it's reasonable size
            if (jsonString.length > 1000) {
                console.warn("Data might be too large, but trying anyway...");
            }
            
            try {
                const base64Data = btoa(jsonString);
                const finalUrl = arPageUrl.split('#')[0] + '#' + base64Data;
                
                console.log("Final URL length:", finalUrl.length);
                
                // Clear previous QR
                qrcodeDiv.innerHTML = '';
                
                // Generate QR code
                currentQRCode = new QRCode(qrcodeDiv, {
                    text: finalUrl,
                    width: 220,
                    height: 220,
                    colorDark: "#000000",
                    colorLight: "#ffffff"
                });
                
                // Show URL
                resultUrlDiv.textContent = finalUrl.substring(0, 60) + '...';
                resultUrlDiv.title = finalUrl;
                
                showStatus('✅ QR code generated!', 'success');
                
                // Auto-test after 1 second
                setTimeout(() => {
                    testQRCode();
                }, 1000);
                
            } catch (error) {
                console.error("QR generation error:", error);
                showStatus('❌ Error: ' + error.message, 'error');
                qrcodeDiv.innerHTML = 'Error: Could not generate QR';
            }
        }
        
        function testQRCode() {
            const canvas = qrcodeDiv.querySelector('canvas');
            if (canvas) {
                // Create test link
                const testLink = document.createElement('a');
                testLink.href = '#';
                testLink.onclick = function() {
                    const fullUrl = resultUrlDiv.title || resultUrlDiv.textContent;
                    if (fullUrl && !fullUrl.includes('will appear')) {
                        window.open(fullUrl, '_blank');
                    }
                };
                testLink.innerHTML = '🔗 Tap to test in new tab';
                testLink.style.display = 'block';
                testLink.style.marginTop = '10px';
                testLink.style.color = '#007bff';
                testLink.style.textDecoration = 'none';
                testLink.style.fontWeight = 'bold';
                
                qrcodeDiv.appendChild(testLink);
            }
        }
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 4000);
        }
        
        // Initialize
        window.onload = function() {
            console.log("QR Generator ready!");
            showStatus('📱 Ready! Upload a short video or enter text', 'success');
        };
    </script>
</body>
</html>
