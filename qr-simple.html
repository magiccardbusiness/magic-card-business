<!DOCTYPE html>
<html>
<head>
    <title>Magic Card QR Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #667eea;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .generate-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            margin: 20px 0;
            transition: background 0.3s;
        }
        
        .generate-btn:hover {
            background: #5a67d8;
        }
        
        .qrcode-container {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-top: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .qrcode-container canvas {
            border: 10px solid white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .url-box {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            word-break: break-all;
            font-size: 14px;
            border: 2px solid #e9ecef;
        }
        
        .test-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }
        
        .test-btn:hover {
            background: #38a169;
        }
        
        .test-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .status {
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        
        .success {
            background: #c6f6d5;
            color: #22543d;
            border: 2px solid #9ae6b4;
        }
        
        .error {
            background: #fed7d7;
            color: #742a2a;
            border: 2px solid #fc8181;
        }
        
        .loading {
            color: #667eea;
            font-size: 16px;
        }
        
        .video-note {
            background: #e6fffa;
            border: 2px solid #81e6d9;
            color: #234e52;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 Magic Card QR Generator</h1>
        <p class="subtitle">Create QR codes for AR greeting cards</p>
        
        <div class="input-group">
            <label>Card ID:</label>
            <input type="text" id="cardId" value="CARD<?php echo rand(1000,9999); ?>" placeholder="Enter unique card ID">
        </div>
        
        <div class="input-group">
            <label>Message Type:</label>
            <select id="messageType">
                <option value="text">Text Message</option>
                <option value="video" selected>Video Message</option>
                <option value="image">Image Message</option>
            </select>
        </div>
        
        <div class="input-group" id="textInput">
            <label>Text Message:</label>
            <textarea id="messageText">🎉 Happy Birthday! Wishing you a magical day filled with joy! 🎂</textarea>
        </div>
        
        <div class="input-group" id="mediaInput" style="display: none;">
            <label>Media URL:</label>
            <input type="text" id="mediaUrl" value="https://res.cloudinary.com/diqa9qyvh/video/upload/v1767377987/20251219_010742000_iOS_xuandm.mp4" placeholder="Enter video or image URL">
            
            <div class="video-note">
                <strong>For videos:</strong> Upload to Cloudinary first, then paste the URL here.<br>
                <strong>Test video:</strong> Use the default URL above.
            </div>
        </div>
        
        <button class="generate-btn" onclick="generateQRCode()">
            🪄 GENERATE QR CODE
        </button>
        
        <div id="status" class="status"></div>
        
        <div class="qrcode-container">
            <div id="qrcode"></div>
            <div id="qrcodePlaceholder" style="color: #666;">
                Your QR code will appear here
            </div>
        </div>
        
        <div class="url-box" id="urlDisplay">
            Generated URL will appear here
        </div>
        
        <button class="test-btn" onclick="testQRCode()" id="testBtn" disabled>
            🔗 TEST QR CODE IN NEW TAB
        </button>
    </div>

    <script>
        // Elements
        const statusDiv = document.getElementById('status');
        const qrcodeDiv = document.getElementById('qrcode');
        const qrcodePlaceholder = document.getElementById('qrcodePlaceholder');
        const urlDisplay = document.getElementById('urlDisplay');
        const testBtn = document.getElementById('testBtn');
        const messageTypeSelect = document.getElementById('messageType');
        const textInput = document.getElementById('textInput');
        const mediaInput = document.getElementById('mediaInput');
        
        let currentQRCode = null;
        let currentUrl = '';
        
        // Initialize message type
        messageTypeSelect.value = 'video';
        textInput.style.display = 'none';
        mediaInput.style.display = 'block';
        
        // Handle message type change
        messageTypeSelect.addEventListener('change', function() {
            const type = this.value;
            if (type === 'text') {
                textInput.style.display = 'block';
                mediaInput.style.display = 'none';
            } else {
                textInput.style.display = 'none';
                mediaInput.style.display = 'block';
            }
        });
        
        // 🚀 MAIN FUNCTION: Generate QR Code
        function generateQRCode() {
            console.log('Starting QR code generation...');
            
            const cardId = document.getElementById('cardId').value.trim() || 'CARD' + Date.now().toString().slice(-6);
            const messageType = messageTypeSelect.value;
            let messageContent = '';
            
            // Get message content based on type
            if (messageType === 'text') {
                messageContent = document.getElementById('messageText').value.trim();
                if (!messageContent) {
                    showStatus('❌ Please enter a message', 'error');
                    return;
                }
            } else {
                messageContent = document.getElementById('mediaUrl').value.trim();
                if (!messageContent) {
                    showStatus('❌ Please enter a media URL', 'error');
                    return;
                }
            }
            
            // Create data object
            const messageData = {
                card: cardId,
                type: messageType,
                message: messageContent,
                time: new Date().toISOString()
            };
            
            // Convert to Base64
            const jsonString = JSON.stringify(messageData);
            const base64Data = btoa(jsonString);
            
            // Create final URL
            const arPageUrl = 'https://magic-card-business.vercel.app/';
            currentUrl = arPageUrl + '#' + base64Data;
            
            console.log('Generated URL:', currentUrl);
            console.log('Data length:', jsonString.length);
            
            // Show loading
            qrcodePlaceholder.innerHTML = '<div class="loading">Generating QR Code...</div>';
            showStatus('⏳ Generating QR code...', 'success');
            
            // Clear previous QR code
            qrcodeDiv.innerHTML = '';
            
            try {
                // Generate QR code
                currentQRCode = new QRCode(qrcodeDiv, {
                    text: currentUrl,
                    width: 256,
                    height: 256,
                    colorDark: "#000000",
                    colorLight: "#FFFFFF",
                    correctLevel: QRCode.CorrectLevel.H
                });
                
                // Hide placeholder
                qrcodePlaceholder.style.display = 'none';
                
                // Show URL
                urlDisplay.textContent = currentUrl.substring(0, 80) + '...';
                urlDisplay.title = currentUrl;
                
                // Enable test button
                testBtn.disabled = false;
                
                showStatus('✅ QR Code Generated Successfully!', 'success');
                
                // Update card ID for next time
                document.getElementById('cardId').value = 'CARD' + Date.now().toString().slice(-6);
                
            } catch (error) {
                console.error('QR Code generation error:', error);
                qrcodePlaceholder.innerHTML = '❌ Error generating QR code';
                qrcodePlaceholder.style.display = 'block';
                showStatus('❌ Error: ' + error.message, 'error');
            }
        }
        
        // Test the QR code
        function testQRCode() {
            if (!currentUrl) {
                showStatus('❌ Generate a QR code first', 'error');
                return;
            }
            
            // Add cache busting parameter
            const testUrl = currentUrl + '&_=' + Date.now();
            window.open(testUrl, '_blank');
            showStatus('🔗 Opening in new tab...', 'success');
        }
        
        // Show status message
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
        
        // Initialize on page load
        window.onload = function() {
            console.log('QR Generator loaded');
            showStatus('📱 Ready! Enter your message and click GENERATE', 'success');
            
            // Test if QRCode library is loaded
            if (typeof QRCode === 'undefined') {
                showStatus('❌ QRCode library failed to load. Please refresh the page.', 'error');
                qrcodePlaceholder.innerHTML = '❌ Library failed to load. Refresh page.';
            } else {
                console.log('QRCode library loaded successfully');
                
                // Auto-generate a QR code for testing
                setTimeout(() => {
                    generateQRCode();
                }, 500);
            }
        };
    </script>
</body>
</html>
