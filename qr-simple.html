<!DOCTYPE html>
<html>
<head>
    <title>Magic Card QR Generator - SIMPLE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #667eea;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #qrcode {
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            display: inline-block;
        }
        .url-box {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            word-break: break-all;
            margin-top: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 MAGIC CARD QR GENERATOR</h1>
        
        <input type="text" id="cardId" placeholder="Enter Card ID (like BIRTHDAY001)" value="TEST123">
        
        <button onclick="generateQR()">🪄 GENERATE QR CODE</button>
        
        <div id="qrcode">
            <p>QR code will appear here</p>
        </div>
        
        <div class="url-box" id="urlDisplay">
            URL will appear here
        </div>
        
        <div style="margin-top: 20px; background: #e8f4fd; padding: 15px; border-radius: 10px;">
            <h3>🎯 HOW TO USE:</h3>
            <p>1. Type Card ID (like BIRTHDAY001)</p>
            <p>2. Click GENERATE</p>
            <p>3. Print the QR code on a card</p>
            <p>4. People scan to send/receive messages!</p>
        </div>
    </div>

    <script>
        function generateQR() {
            const cardId = document.getElementById('cardId').value.trim();
            
            if (!cardId) {
                alert("Please enter a Card ID!");
                return;
            }
            
            // Create the URL for the VIEW page
            const url = `https://magic-card-business.vercel.app/view.html?card=${encodeURIComponent(cardId)}`;
            
            console.log("Generating QR for:", url);
            
            // Clear previous QR
            document.getElementById('qrcode').innerHTML = '';
            
            // Generate QR code
            QRCode.toCanvas(document.getElementById('qrcode'), url, {
                width: 256,
                margin: 2,
                color: {
                    dark: '#000000',
                    light: '#FFFFFF'
                }
            }, function (error) {
                if (error) {
                    console.error("QR error:", error);
                    document.getElementById('qrcode').innerHTML = '<p style="color:red;">❌ Error making QR. Try refreshing page.</p>';
                } else {
                    console.log("✅ QR generated!");
                    document.getElementById('urlDisplay').textContent = url;
                    
                    // Add download button
                    const downloadBtn = document.createElement('button');
                    downloadBtn.innerHTML = '⬇️ DOWNLOAD QR';
                    downloadBtn.style.background = '#28a745';
                    downloadBtn.style.marginLeft = '10px';
                    downloadBtn.onclick = function() {
                        const canvas = document.querySelector('#qrcode canvas');
                        if (canvas) {
                            const link = document.createElement('a');
                            link.download = `magic-card-${cardId}.png`;
                            link.href = canvas.toDataURL('image/png');
                            link.click();
                        }
                    };
                    
                    // Add test button
                    const testBtn = document.createElement('button');
                    testBtn.innerHTML = '🔗 TEST CARD';
                    testBtn.style.background = '#007bff';
                    testBtn.style.marginLeft = '10px';
                    testBtn.onclick = function() {
                        window.open(url, '_blank');
                    };
                    
                    document.getElementById('qrcode').appendChild(downloadBtn);
                    document.getElementById('qrcode').appendChild(testBtn);
                }
            });
        }
        
        // Auto-generate on load
        window.onload = function() {
            setTimeout(generateQR, 500);
        };
    </script>
</body>
</html>
