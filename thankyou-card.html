<!DOCTYPE html>
<html>
<head>
    <title>Thank You Magic Card</title>
    <style>
        @media print {
            @page { size: 5in 7in; margin: 0; }
            body { margin: 0; -webkit-print-color-adjust: exact; }
        }
        body {
            margin: 0;
            padding: 0;
            width: 5in;
            height: 7in;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #27AE60;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            width: 4.5in;
            height: 6.5in;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .hearts {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 40px;
            color: #E74C3C;
        }
        .title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #27AE60;
            margin-top: 80px;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .qr-area {
            width: 2in;
            height: 2in;
            background: #f8f8f8;
            border: 2px dashed #27AE60;
            border-radius: 10px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
            text-align: center;
            padding: 10px;
        }
        .instructions {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }
        .magic-badge {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: #FFD700;
            color: #333;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: bold;
        }
        .ar-hint {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 10px;
            text-align: center;
            width: 1.5in;
        }
        .leaf-decoration {
            position: absolute;
            bottom: 60px;
            right: 30px;
            font-size: 30px;
            color: #27AE60;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="hearts">💚💚💚</div>
        <div class="leaf-decoration">🍃</div>
        <div class="ar-hint">📱 Point camera here for AR magic!</div>
        
        <div class="title">THANK YOU</div>
        <div class="subtitle">Gratitude with augmented reality</div>
        
        <div class="qr-area">
            [QR CODE AREA]<br><br>
            Scan → Say Thanks →<br>
            Share Appreciation
        </div>
        
        <div class="instructions">
            <strong>HOW IT WORKS:</strong><br>
            1. Scan QR code with phone<br>
            2. Record your thank you message<br>
            3. Give card to show appreciation<br>
            4. They scan to see your message!
        </div>
        
        <div class="magic-badge">✨ MAGIC CARD ✨</div>
    </div>
    
    <script>
        setTimeout(() => {
            alert("💝 THANK YOU CARD READY TO PRINT!\n\nPrint Settings:\n• Paper: 5x7 inches\n• Quality: Best\n• Margins: None\n• Cardstock recommended");
            window.print();
        }, 1000);
    </script>
</body>
</html>
