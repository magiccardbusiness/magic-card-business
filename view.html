<!DOCTYPE html>
<html>
<head>
    <title>Magic Card - Upload</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 { color: #333; }
        .card-id {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            margin: 20px 0;
        }
        .message-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            min-height: 100px;
            border: 2px dashed #667eea;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }
        .success { background: #28a745; }
        .error { 
            background: #dc3545; 
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
    
    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2KubmablXwpbSpMT8RCba_Na-7XnpuKY",
            authDomain: "magic-card-business.firebaseapp.com",
            projectId: "magic-card-business",
            storageBucket: "magic-card-business.firebasestorage.app",
            messagingSenderId: "837403328170",
            appId: "1:837403328170:web:3d768122e4d03b98905ad3"
        };
        
        // Initialize Firebase
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            console.log("✅ Firebase connected!");
        } catch (error) {
            console.log("❌ Firebase error:", error);
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>🎴 MAGIC CARD</h1>
        <div class="card-id" id="cardIdDisplay">Loading...</div>
        
        <div id="loading">
            <h2>Loading...</h2>
            <p>Checking for messages...</p>
        </div>
        
        <div id="noMessage" style="display:none;">
            <h2>✨ No Message Yet!</h2>
            <p>This card is waiting for its first magical message!</p>
            <div class="message-box">
                <textarea id="messageText" placeholder="Type your magical message here...">Happy Birthday! 🎂✨</textarea>
                <button onclick="saveMessage()" class="success">🚀 SAVE MESSAGE</button>
            </div>
        </div>
        
        <div id="hasMessage" style="display:none;">
            <h2>📜 Current Message:</h2>
            <div class="message-box" id="currentMessage">
                Loading message...
            </div>
            <button onclick="showUploadForm()">📝 NEW MESSAGE</button>
            <button onclick="viewInAR()" class="success">🔮 VIEW IN AR</button>
        </div>
        
        <div id="uploadForm" style="display:none;">
            <h2>📝 New Message</h2>
            <div class="message-box">
                <textarea id="newMessageText" placeholder="Type new message..."></textarea>
                <button onclick="saveNewMessage()" class="success">💾 SAVE NEW MESSAGE</button>
                <button onclick="cancelUpload()">↩️ CANCEL</button>
            </div>
        </div>
        
        <div id="status" style="display:none;"></div>
        
        <div style="margin-top: 30px; padding: 20px; background: #e8f4fd; border-radius: 10px;">
            <h3>🎯 How This Works:</h3>
            <p>1. Upload message here</p>
            <p>2. Receiver scans QR code</p>
            <p>3. Message appears in AR! ✨</p>
        </div>
    </div>

    <script>
        // Get card ID from URL
        function getCardId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('card') || 'TEST123';
        }
        
        // Show status message
        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = message;
            statusDiv.className = isError ? 'error' : '';
            statusDiv.style.display = 'block';
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
        
        // Load message from Firebase
        async function loadMessage() {
            const cardId = getCardId();
            document.getElementById('cardIdDisplay').textContent = `Card: ${cardId}`;
            
            if (!db) {
                showStatus("⚠️ No internet connection", true);
                document.getElementById('noMessage').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                return;
            }
            
            try {
                const doc = await db.collection('cards').doc(cardId).get();
                
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('currentMessage').textContent = data.message || data.type || 'Message loaded';
                    document.getElementById('hasMessage').style.display = 'block';
                } else {
                    document.getElementById('noMessage').style.display = 'block';
                }
                
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                console.error("Load error:", error);
                showStatus("⚠️ Connection error. Trying offline mode...", true);
                document.getElementById('noMessage').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        // Save message to Firebase
        async function saveMessage() {
            const cardId = getCardId();
            const message = document.getElementById('messageText').value.trim();
            
            if (!message) {
                showStatus("Please type a message!", true);
                return;
            }
            
            if (!db) {
                showStatus("⚠️ No internet - can't save", true);
                return;
            }
            
            try {
                await db.collection('cards').doc(cardId).set({
                    cardId: cardId,
                    type: 'text',
                    message: message,
                    createdAt: new Date().toISOString()
                });
                
                showStatus("✅ Message saved to cloud! ✨");
                setTimeout(() => {
                    location.reload();
                }, 1500);
                
            } catch (error) {
                console.error("Save error:", error);
                showStatus("❌ Save failed. Try again.", true);
            }
        }
        
        // UI functions
        function showUploadForm() {
            document.getElementById('hasMessage').style.display = 'none';
            document.getElementById('uploadForm').style.display = 'block';
        }
        
        function cancelUpload() {
            location.reload();
        }
        
        async function saveNewMessage() {
            await saveMessage();
        }
        
        function viewInAR() {
            const cardId = getCardId();
            window.location.href = `index.html?card=${encodeURIComponent(cardId)}`;
        }
        
        // Start on load
        window.onload = loadMessage;
    </script>
</body>
</html>
