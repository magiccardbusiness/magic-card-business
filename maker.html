<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Card Maker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }
        
        button {
            background: #06D6A0;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 5px;
        }
        
        button:hover {
            background: #05b587;
        }
        
        #status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        
        .success {
            background: rgba(6, 214, 160, 0.2);
            border: 1px solid #06D6A0;
            color: #06D6A0;
        }
        
        .error {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #FF6B6B;
            color: #FF6B6B;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    
    <div class="container">
        <h1>🎴 Create Magic Card</h1>
        
        <div class="form-group">
            <label>Card ID:</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="cardId" value="CARD6841">
                <button id="generateBtn">🎲 Generate New</button>
            </div>
            <small style="color: #aaa;">Format: CARD followed by numbers</small>
        </div>
        
        <div class="form-group">
            <label>Content Type:</label>
            <select id="cardType">
                <option value="text">📄 Text Message</option>
                <option value="image">🖼️ Image Card</option>
                <option value="video">🎬 Video Card</option>
            </select>
        </div>
        
        <div id="textFields">
            <div class="form-group">
                <label>Your Message:</label>
                <textarea id="message" rows="4">Happy Birthday! 🎉</textarea>
            </div>
        </div>
        
        <div id="mediaFields" style="display: none;">
            <div class="form-group">
                <label id="fileLabel">Select File:</label>
                <input type="file" id="mediaFile">
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <button id="saveBtn">💾 Save Card</button>
            <button id="testBtn" style="background: #667eea;">🔍 Test Card</button>
        </div>
        
        <div id="status"></div>
    </div>

    <script>
        // DEBUG: Log when script loads
        console.log("✅ Script loaded successfully");
        
        // Get elements
        const cardIdInput = document.getElementById('cardId');
        const generateBtn = document.getElementById('generateBtn');
        const cardTypeSelect = document.getElementById('cardType');
        const messageTextarea = document.getElementById('message');
        const mediaFileInput = document.getElementById('mediaFile');
        const saveBtn = document.getElementById('saveBtn');
        const testBtn = document.getElementById('testBtn');
        const textFields = document.getElementById('textFields');
        const mediaFields = document.getElementById('mediaFields');
        const statusDiv = document.getElementById('status');
        
        // DEBUG: Check if elements exist
        console.log("Elements found:", {
            cardIdInput: !!cardIdInput,
            generateBtn: !!generateBtn,
            cardTypeSelect: !!cardTypeSelect,
            saveBtn: !!saveBtn
        });
        
        // Function to generate card ID
        function generateCardId() {
            console.log("Generate button clicked");
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            const newId = `CARD${randomNum}`;
            cardIdInput.value = newId;
            showStatus(`Generated: ${newId}`, 'success');
            return newId;
        }
        
        // Function to toggle fields based on content type
        function toggleContentFields() {
            const type = cardTypeSelect.value;
            console.log("Content type changed to:", type);
            
            if (type === 'text') {
                textFields.style.display = 'block';
                mediaFields.style.display = 'none';
            } else {
                textFields.style.display = 'none';
                mediaFields.style.display = 'block';
            }
        }
        
        // Function to save card
        async function saveCard() {
            console.log("Save button clicked");
            const cardId = cardIdInput.value.trim();
            
            if (!cardId) {
                showStatus("Please enter a Card ID", 'error');
                return;
            }
            
            showStatus("Saving...", 'info');
            
            // For now, just save to localStorage
            const cardData = {
                card_id: cardId,
                message_type: cardTypeSelect.value,
                message_text: messageTextarea.value,
                created_at: new Date().toISOString()
            };
            
            localStorage.setItem(`magic_card_${cardId}`, JSON.stringify(cardData));
            showStatus(`✅ Card "${cardId}" saved locally!`, 'success');
        }
        
        // Function to test card
        function testCard() {
            console.log("Test button clicked");
            const cardId = cardIdInput.value.trim();
            
            if (!cardId) {
                showStatus("Please enter a Card ID", 'error');
                return;
            }
            
            const cardData = localStorage.getItem(`magic_card_${cardId}`);
            if (cardData) {
                showStatus(`✅ Found card "${cardId}" in storage`, 'success');
            } else {
                showStatus(`❌ Card "${cardId}" not found`, 'error');
            }
        }
        
        // Function to show status messages
        function showStatus(message, type) {
            console.log(`Status: ${message}`);
            statusDiv.textContent = message;
            statusDiv.className = type;
            statusDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 3000);
            }
        }
        
        // Add event listeners
        generateBtn.addEventListener('click', generateCardId);
        cardTypeSelect.addEventListener('change', toggleContentFields);
        saveBtn.addEventListener('click', saveCard);
        testBtn.addEventListener('click', testCard);
        
        // Initialize
        toggleContentFields();
        console.log("✅ Maker page initialized successfully");
        
        // Test generate button immediately
        generateBtn.style.background = '#FF6B6B'; // Visual feedback
        setTimeout(() => {
            generateBtn.style.background = '#06D6A0';
        }, 100);
        
        // Make sure we can see debug logs
        setTimeout(() => {
            console.log("Page fully loaded - all functions available");
            console.log("Try clicking Generate button!");
        }, 500);
    </script>
</body>
</html>
