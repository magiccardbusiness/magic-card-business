<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Card Maker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
            background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
            color: #e2e8f0;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(45, 55, 72, 0.8);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(226, 232, 240, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53, #ffd166, #06d6a0, #118ab2, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #a0aec0;
            font-size: 16px;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(74, 85, 104, 0.7);
            color: #e2e8f0;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            border: 1px solid rgba(226, 232, 240, 0.2);
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .back-btn:hover {
            background: rgba(102, 126, 234, 0.7);
            transform: translateY(-2px);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e0;
            font-size: 16px;
            font-weight: bold;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(226, 232, 240, 0.2);
            border-radius: 10px;
            background: rgba(26, 32, 44, 0.7);
            color: #e2e8f0;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: rgba(26, 32, 44, 0.9);
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .input-group input {
            flex: 1;
        }
        
        .btn {
            background: linear-gradient(135deg, #06d6a0 0%, #118ab2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(6, 214, 160, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-generate {
            background: rgba(255, 209, 102, 0.9);
            color: #2d3748;
            padding: 15px;
            white-space: nowrap;
        }
        
        .btn-generate:hover {
            background: rgba(255, 209, 102, 1);
            box-shadow: 0 10px 20px rgba(255, 209, 102, 0.3);
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        #status {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            display: none;
            border: 2px solid transparent;
        }
        
        .status-success {
            background: rgba(6, 214, 160, 0.15);
            border-color: rgba(6, 214, 160, 0.3);
            color: #06d6a0;
        }
        
        .status-error {
            background: rgba(255, 107, 107, 0.15);
            border-color: rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }
        
        .status-info {
            background: rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
            color: #667eea;
        }
        
        .preview-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(26, 32, 44, 0.7);
            border-radius: 15px;
            border: 2px dashed rgba(226, 232, 240, 0.2);
        }
        
        .preview-title {
            color: #a0aec0;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #cardPreview {
            font-size: 16px;
            line-height: 1.6;
            color: #e2e8f0;
            min-height: 80px;
            padding: 15px;
            background: rgba(45, 55, 72, 0.5);
            border-radius: 10px;
            border: 1px solid rgba(226, 232, 240, 0.1);
        }
        
        .file-info {
            color: #a0aec0;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .instructions {
            color: #a0aec0;
            font-size: 14px;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Home</a>
    
    <div class="container">
        <div class="header">
            <h1 class="logo">🎴 Create Magic Card</h1>
            <p class="subtitle">Design magical AR cards with text, images, videos, or audio</p>
        </div>
        
        <div class="form-group">
            <label>🎴 Card ID (Required):</label>
            <div class="input-group">
                <input type="text" id="cardId" value="CARD6841" placeholder="e.g., CARD1234">
                <button id="generateBtn" class="btn-generate">🎲 Generate</button>
            </div>
            <div class="instructions">Format: CARD followed by numbers. Must be unique for each card.</div>
        </div>
        
        <div class="form-group">
            <label>📝 Content Type:</label>
            <select id="cardType">
                <option value="text">📄 Text Message</option>
                <option value="image">🖼️ Image Card</option>
                <option value="video">🎬 Video Card</option>
                <option value="audio">🎵 Audio/Voice Card</option>
            </select>
        </div>
        
        <div id="textFields">
            <div class="form-group">
                <label>💌 Your Message:</label>
                <textarea id="message" placeholder="Enter your magical message here...">Happy Birthday! 🎉 Wishing you an amazing day filled with joy and laughter! ✨❤️</textarea>
            </div>
        </div>
        
        <div id="mediaFields" style="display: none;">
            <div class="form-group">
                <label id="fileLabel">📁 Select Media File:</label>
                <input type="file" id="mediaFile">
                <div class="file-info" id="fileInfo">No file selected</div>
            </div>
        </div>
        
        <div class="preview-box">
            <div class="preview-title">👁️ Preview:</div>
            <div id="cardPreview">Your card content will appear here...</div>
        </div>
        
        <div class="button-group">
            <button id="saveBtn" class="btn">💾 Save to Cloud</button>
            <button id="testBtn" class="btn btn-secondary">🔍 Test Card</button>
        </div>
        
        <div id="status"></div>
    </div>

    <script>
        // Debug logging
        console.log("✅ Magic Card Maker loaded");
        
        // Get DOM elements
        const elements = {
            cardId: document.getElementById('cardId'),
            generateBtn: document.getElementById('generateBtn'),
            cardType: document.getElementById('cardType'),
            message: document.getElementById('message'),
            mediaFile: document.getElementById('mediaFile'),
            saveBtn: document.getElementById('saveBtn'),
            testBtn: document.getElementById('testBtn'),
            textFields: document.getElementById('textFields'),
            mediaFields: document.getElementById('mediaFields'),
            fileLabel: document.getElementById('fileLabel'),
            fileInfo: document.getElementById('fileInfo'),
            cardPreview: document.getElementById('cardPreview'),
            status: document.getElementById('status')
        };
        
        // Initialize Supabase
        const SUPABASE_URL = 'https://elmhkhvryjzljxskbfps.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsbWhraHZyeWp6bGp4c2tiZnBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0NDc3NjMsImV4cCI6MjA4NDAyMzc2M30.Orrh2Pejnt3KPJMTUTmRRkhCwtZVfjUreKvX546bOcw';
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log("✅ Supabase initialized");
        } catch (error) {
            console.log("⚠️ Supabase offline mode");
        }
        
        // Generate new Card ID
        function generateCardId() {
            console.log("🎲 Generating new Card ID");
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            const newId = `CARD${randomNum}`;
            elements.cardId.value = newId;
            updatePreview();
            showStatus(`✅ Generated new ID: ${newId}`, 'success');
            return newId;
        }
        
        // Toggle between text and media fields
        function toggleContentFields() {
            const type = elements.cardType.value;
            console.log(`📝 Content type changed to: ${type}`);
            
            if (type === 'text') {
                elements.textFields.style.display = 'block';
                elements.mediaFields.style.display = 'none';
            } else {
                elements.textFields.style.display = 'none';
                elements.mediaFields.style.display = 'block';
                
                // Update labels based on type
                switch(type) {
                    case 'image':
                        elements.fileLabel.innerHTML = '🖼️ Select Image:';
                        elements.fileInfo.textContent = 'JPG, PNG, GIF, WEBP (Max 5MB)';
                        elements.mediaFile.accept = 'image/*';
                        break;
                    case 'video':
                        elements.fileLabel.innerHTML = '🎬 Select Video:';
                        elements.fileInfo.textContent = 'MP4, WEBM, MOV (Max 10MB)';
                        elements.mediaFile.accept = 'video/*';
                        break;
                    case 'audio':
                        elements.fileLabel.innerHTML = '🎵 Select Audio:';
                        elements.fileInfo.textContent = 'MP3, WAV, OGG (Max 5MB)';
                        elements.mediaFile.accept = 'audio/*';
                        break;
                }
            }
            updatePreview();
        }
        
        // Update preview display
        function updatePreview() {
            const cardId = elements.cardId.value || 'CARD0000';
            const type = elements.cardType.value;
            
            let previewHTML = `<strong>Card ID:</strong> ${cardId}<br>`;
            previewHTML += `<strong>Type:</strong> `;
            
            switch(type) {
                case 'text':
                    previewHTML += `📄 Text Card<br>`;
                    const message = elements.message.value || 'No message';
                    previewHTML += `<strong>Message:</strong> ${message.substring(0, 80)}`;
                    if (message.length > 80) previewHTML += '...';
                    break;
                    
                case 'image':
                    previewHTML += `🖼️ Image Card<br>`;
                    if (elements.mediaFile.files.length > 0) {
                        const file = elements.mediaFile.files[0];
                        previewHTML += `<strong>File:</strong> ${file.name}<br>`;
                        previewHTML += `<strong>Size:</strong> ${(file.size / 1024 / 1024).toFixed(2)} MB`;
                    } else {
                        previewHTML += `<em>No image selected</em>`;
                    }
                    break;
                    
                case 'video':
                    previewHTML += `🎬 Video Card<br>`;
                    if (elements.mediaFile.files.length > 0) {
                        const file = elements.mediaFile.files[0];
                        previewHTML += `<strong>File:</strong> ${file.name}<br>`;
                        previewHTML += `<strong>Size:</strong> ${(file.size / 1024 / 1024).toFixed(2)} MB`;
                    } else {
                        previewHTML += `<em>No video selected</em>`;
                    }
                    break;
                    
                case 'audio':
                    previewHTML += `🎵 Audio Card<br>`;
                    if (elements.mediaFile.files.length > 0) {
                        const file = elements.mediaFile.files[0];
                        previewHTML += `<strong>File:</strong> ${file.name}<br>`;
                        previewHTML += `<strong>Size:</strong> ${(file.size / 1024 / 1024).toFixed(2)} MB`;
                        previewHTML += `<br><small>🎤 Audio cards play voice messages or music</small>`;
                    } else {
                        previewHTML += `<em>No audio file selected</em>`;
                    }
                    break;
            }
            
            elements.cardPreview.innerHTML = previewHTML;
        }
        
        // Save card to Supabase
        async function saveCard() {
            console.log("💾 Saving card...");
            const cardId = elements.cardId.value.trim();
            
            if (!cardId || !cardId.match(/^CARD\d+$/)) {
                showStatus("❌ Please enter a valid Card ID (CARD followed by numbers)", 'error');
                return;
            }
            
            showStatus("⏳ Saving to cloud...", 'info');
            
            // Disable save button to prevent double clicks
            elements.saveBtn.disabled = true;
            elements.saveBtn.innerHTML = '⏳ Saving...';
            
            try {
                const cardData = {
                    card_id: cardId,
                    message_type: elements.cardType.value,
                    status: 'active',
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };
                
                // Add content based on type
                if (elements.cardType.value === 'text') {
                    const message = elements.message.value.trim();
                    if (!message) {
                        showStatus("❌ Please enter a message", 'error');
                        elements.saveBtn.disabled = false;
                        elements.saveBtn.innerHTML = '💾 Save to Cloud';
                        return;
                    }
                    cardData.message_text = message;
                } else {
                    if (!elements.mediaFile.files.length) {
                        showStatus(`❌ Please select a ${elements.cardType.value} file`, 'error');
                        elements.saveBtn.disabled = false;
                        elements.saveBtn.innerHTML = '💾 Save to Cloud';
                        return;
                    }
                    
                    const file = elements.mediaFile.files[0];
                    cardData.file_name = file.name;
                    cardData.file_size = file.size;
                    cardData.file_type = file.type;
                }
                
                let supabaseSuccess = false;
                
                // Try to save to Supabase if available
                if (supabase) {
                    try {
                        const { data, error } = await supabase
                            .from('cards')
                            .upsert(cardData, { onConflict: 'card_id' });
                        
                        if (error) {
                            console.error("Supabase error:", error);
                            throw error;
                        }
                        
                        supabaseSuccess = true;
                        console.log("✅ Saved to Supabase");
                    } catch (supabaseError) {
                        console.log("⚠️ Supabase save failed, using local storage");
                    }
                }
                
                // Always save locally as backup
                localStorage.setItem(`magic_card_${cardId}`, JSON.stringify(cardData));
                console.log("✅ Saved locally");
                
                // Show appropriate success message
                if (supabaseSuccess) {
                    showStatus(`✨ Card "${cardId}" saved to cloud successfully!`, 'success');
                } else {
                    showStatus(`💾 Card "${cardId}" saved locally (offline mode)`, 'info');
                }
                
                // Clear file input after successful save
                elements.mediaFile.value = '';
                updatePreview();
                
            } catch (error) {
                console.error("Save error:", error);
                showStatus("❌ Failed to save card", 'error');
                
                // Fallback to localStorage only as last resort
                try {
                    const cardId = elements.cardId.value;
                    const cardData = {
                        card_id: cardId,
                        message_type: elements.cardType.value,
                        message_text: elements.message.value,
                        status: 'active',
                        created_at: new Date().toISOString()
                    };
                    localStorage.setItem(`magic_card_${cardId}`, JSON.stringify(cardData));
                    console.log("✅ Emergency save to localStorage");
                } catch (localError) {
                    console.error("Emergency save failed:", localError);
                }
            } finally {
                // Re-enable save button
                setTimeout(() => {
                    elements.saveBtn.disabled = false;
                    elements.saveBtn.innerHTML = '💾 Save to Cloud';
                }, 1000);
            }
        }
        
        // Test if card exists
        function testCard() {
            console.log("🔍 Testing card...");
            const cardId = elements.cardId.value.trim();
            
            if (!cardId) {
                showStatus("❌ Please enter a Card ID", 'error');
                return;
            }
            
            // Try Supabase first, then localStorage
            checkCardExists(cardId).then(exists => {
                if (exists) {
                    showStatus(`✅ Card "${cardId}" found in database`, 'success');
                } else {
                    showStatus(`❌ Card "${cardId}" not found. Save it first.`, 'error');
                }
            });
        }
        
        // Check if card exists in Supabase or localStorage
        async function checkCardExists(cardId) {
            // Check localStorage first (fastest)
            const localCard = localStorage.getItem(`magic_card_${cardId}`);
            if (localCard) {
                return true;
            }
            
            // Check Supabase if available
            if (supabase) {
                try {
                    const { data, error } = await supabase
                        .from('cards')
                        .select('card_id')
                        .eq('card_id', cardId)
                        .single();
                    
                    return !error && data !== null;
                } catch (error) {
                    console.log("Supabase check failed:", error);
                    return false;
                }
            }
            
            return false;
        }
        
        // Show status messages with proper emojis
        function showStatus(message, type) {
            console.log(`Status [${type}]: ${message}`);
            
            // Ensure emojis are correct
            let displayMessage = message;
            if (type === 'success' && !message.includes('✅') && !message.includes('✨')) {
                displayMessage = `✅ ${message}`;
            } else if (type === 'error' && !message.includes('❌')) {
                displayMessage = `❌ ${message}`;
            } else if (type === 'info' && !message.includes('⏳') && !message.includes('💾') && !message.includes('⚠️')) {
                displayMessage = `⏳ ${message}`;
            }
            
            elements.status.textContent = displayMessage;
            elements.status.className = `status-${type}`;
            elements.status.style.display = 'block';
            
            // Auto-hide success/info messages after 3 seconds
            if (type === 'success' || type === 'info') {
                setTimeout(() => {
                    if (elements.status.style.display === 'block') {
                        elements.status.style.display = 'none';
                    }
                }, 3000);
            }
        }
        
        // Setup event listeners
        function setupEventListeners() {
            elements.generateBtn.addEventListener('click', generateCardId);
            elements.cardType.addEventListener('change', toggleContentFields);
            elements.saveBtn.addEventListener('click', saveCard);
            elements.testBtn.addEventListener('click', testCard);
            
            // Update preview on input changes
            elements.cardId.addEventListener('input', updatePreview);
            elements.message.addEventListener('input', updatePreview);
            elements.mediaFile.addEventListener('change', updatePreview);
            
            console.log("✅ Event listeners set up");
        }
        
        // Initialize the page
        function initialize() {
            setupEventListeners();
            generateCardId();
            toggleContentFields();
            
            // Check Supabase connection
            if (supabase) {
                checkSupabaseConnection();
            }
            
            console.log("✅ Magic Card Maker initialized");
        }
        
        // Check Supabase connection
        async function checkSupabaseConnection() {
            try {
                const { data, error } = await supabase
                    .from('cards')
                    .select('count')
                    .limit(1);
                
                if (error) throw error;
                console.log("✅ Supabase connection verified");
                showStatus("✅ Connected to Supabase cloud", 'success');
            } catch (error) {
                console.log("⚠️ Supabase connection check failed");
                showStatus("⚠️ Working offline - Supabase connection failed", 'info');
            }
        }
        
        // Start when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initialize);
        } else {
            initialize();
        }
        
        // Make functions available globally for debugging
        window.magicCardMaker = {
            generateCardId,
            saveCard,
            testCard,
            updatePreview,
            toggleContentFields,
            checkCardExists
        };
        
        console.log("🎴 Magic Card Maker ready!");
    </script>
</body>
</html>
