<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Card Maker</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #FF6B6B, #FF8E53, #FFD166, #06D6A0, #118AB2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #a0aec0;
            font-size: 16px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-family: inherit;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #06D6A0 0%, #118AB2 100%);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        
        .success {
            background: rgba(6, 214, 160, 0.2);
            border: 1px solid #06D6A0;
            color: #06D6A0;
        }
        
        .error {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #FF6B6B;
            color: #FF6B6B;
        }
        
        .preview {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }
        
        .preview-title {
            color: #a0aec0;
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        #cardPreview {
            font-size: 18px;
            line-height: 1.6;
            color: white;
            min-height: 60px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Home</a>
    
    <div class="container">
        <div class="header">
            <h1 class="logo">🎴 Create Magic Card</h1>
            <p>Design a magical AR card that appears when scanned</p>
        </div>
        
        <div class="form-group">
            <label for="cardId">🎴 Card ID (Required):</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="cardId" placeholder="CARD6841" value="CARD6841">
                <button onclick="generateId()" class="btn-secondary" style="white-space: nowrap;">🎲 Generate</button>
            </div>
            <small style="color: #777; font-size: 14px; display: block; margin-top: 5px;">
                Make this UNIQUE for each card. Format: CARD followed by numbers.
            </small>
        </div>
        
        <div class="form-group">
            <label for="cardType">📝 Content Type:</label>
            <select id="cardType" onchange="toggleFields()">
                <option value="text">📄 Text Message</option>
                <option value="image">🖼️ Image Card</option>
                <option value="video">🎬 Video Card</option>
            </select>
        </div>
        
        <div id="textFields">
            <div class="form-group">
                <label for="message">💌 Your Message:</label>
                <textarea id="message" placeholder="Enter your magical message here...">Happy Birthday! 🎉 Wishing you an amazing day filled with joy and laughter! ✨❤️</textarea>
            </div>
        </div>
        
        <div id="mediaFields" style="display: none;">
            <div class="form-group">
                <label id="fileLabel">Select File:</label>
                <input type="file" id="mediaFile" style="padding: 12px;">
                <small id="fileHint" style="color: #777; font-size: 14px; display: block; margin-top: 5px;">
                    Max 5MB for images, 10MB for videos
                </small>
            </div>
        </div>
        
        <div class="preview">
            <div class="preview-title">Preview:</div>
            <div id="cardPreview">Your card will appear here...</div>
        </div>
        
        <div class="btn-group">
            <button onclick="saveCard()" class="btn btn-primary">💾 Save to Cloud</button>
            <button onclick="testCard()" class="btn btn-secondary">🔍 Test Card</button>
        </div>
        
        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        // =================== SUPABASE SETUP ===================
        const SUPABASE_URL = 'https://elmhkhvryjzljxskbfps.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsbWhraHZyeWp6bGp4c2tiZnBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0NDc3NjMsImV4cCI6MjA4NDAyMzc2M30.Orrh2Pejnt3KPJMTUTmRRkhCwtZVfjUreKvX546bOcw';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // =================== FUNCTIONS ===================
        function generateId() {
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('cardId').value = `CARD${randomNum}`;
            updatePreview();
        }
        
        function toggleFields() {
            const type = document.getElementById('cardType').value;
            const textFields = document.getElementById('textFields');
            const mediaFields = document.getElementById('mediaFields');
            const fileLabel = document.getElementById('fileLabel');
            const fileHint = document.getElementById('fileHint');
            
            if (type === 'text') {
                textFields.style.display = 'block';
                mediaFields.style.display = 'none';
            } else {
                textFields.style.display = 'none';
                mediaFields.style.display = 'block';
                
                if (type === 'image') {
                    fileLabel.innerHTML = '🖼️ Select Image:';
                    fileHint.textContent = 'JPG, PNG, GIF, WEBP (Max 5MB)';
                    document.getElementById('mediaFile').accept = 'image/*';
                } else {
                    fileLabel.innerHTML = '🎬 Select Video:';
                    fileHint.textContent = 'MP4, WEBM, MOV (Max 10MB)';
                    document.getElementById('mediaFile').accept = 'video/*';
                }
            }
            updatePreview();
        }
        
        function updatePreview() {
            const preview = document.getElementById('cardPreview');
            const cardId = document.getElementById('cardId').value || 'CARD0000';
            const type = document.getElementById('cardType').value;
            
            if (type === 'text') {
                const message = document.getElementById('message').value || 'No message';
                preview.innerHTML = `
                    <strong>Card ID:</strong> ${cardId}<br>
                    <strong>Type:</strong> Text Card<br>
                    <strong>Message:</strong> ${message.substring(0, 100)}${message.length > 100 ? '...' : ''}
                `;
            } else {
                const fileInput = document.getElementById('mediaFile');
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    preview.innerHTML = `
                        <strong>Card ID:</strong> ${cardId}<br>
                        <strong>Type:</strong> ${type === 'image' ? 'Image' : 'Video'} Card<br>
                        <strong>File:</strong> ${file.name}<br>
                        <strong>Size:</strong> ${(file.size / 1024 / 1024).toFixed(2)} MB
                    `;
                } else {
                    preview.innerHTML = `
                        <strong>Card ID:</strong> ${cardId}<br>
                        <strong>Type:</strong> ${type === 'image' ? 'Image' : 'Video'} Card<br>
                        <em>No file selected</em>
                    `;
                }
            }
        }
        
        async function saveCard() {
            const cardId = document.getElementById('cardId').value.trim();
            const type = document.getElementById('cardType').value;
            
            if (!cardId || !cardId.match(/^CARD\d+$/)) {
                showStatus('Please enter a valid Card ID (CARD followed by numbers)', 'error');
                return;
            }
            
            showStatus('Saving to Supabase...', 'info');
            
            try {
                let cardData = {
                    card_id: cardId,
                    message_type: type,
                    status: 'active',
                    created_at: new Date().toISOString()
                };
                
                if (type === 'text') {
                    const message = document.getElementById('message').value.trim();
                    if (!message) {
                        showStatus('Please enter a message', 'error');
                        return;
                    }
                    cardData.message_text = message;
                } else {
                    const fileInput = document.getElementById('mediaFile');
                    if (!fileInput.files.length) {
                        showStatus(`Please select a ${type} file`, 'error');
                        return;
                    }
                    
                    // For simplicity, we'll just store file info
                    const file = fileInput.files[0];
                    cardData.file_name = file.name;
                    cardData.file_size = file.size;
                    cardData.file_type = file.type;
                    // Note: For actual file upload, you'd need to upload to Supabase Storage
                }
                
                // Save to Supabase
                const { data, error } = await supabase
                    .from('cards')
                    .upsert(cardData, { onConflict: 'card_id' });
                
                if (error) throw error;
                
                // Also save to localStorage as backup
                localStorage.setItem(`card_${cardId}`, JSON.stringify(cardData));
                
                showStatus(`✅ Card "${cardId}" saved successfully!`, 'success');
                
                // Clear file input
                document.getElementById('mediaFile').value = '';
                
            } catch (error) {
                console.error('Save error:', error);
                showStatus('⚠️ Saved locally (offline mode)', 'warning');
                
                // Fallback to localStorage
                const cardId = document.getElementById('cardId').value;
                const cardData = {
                    card_id: cardId,
                    message_type: type,
                    message_text: document.getElementById('message').value,
                    status: 'active',
                    created_at: new Date().toISOString()
                };
                localStorage.setItem(`card_${cardId}`, JSON.stringify(cardData));
            }
        }
        
        function testCard() {
            const cardId = document.getElementById('cardId').value;
            if (!cardId) {
                showStatus('Please enter a Card ID first', 'error');
                return;
            }
            
            // Get card from localStorage first, then Supabase
            const localCard = localStorage.getItem(`card_${cardId}`);
            if (localCard) {
                showStatus(`✅ Found card "${cardId}" in local storage`, 'success');
            } else {
                showStatus(`Card "${cardId}" not found locally. Save it first.`, 'error');
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('statusMessage');
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 3000);
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            generateId();
            toggleFields();
            
            // Update preview on input
            document.getElementById('cardId').addEventListener('input', updatePreview);
            document.getElementById('message').addEventListener('input', updatePreview);
            document.getElementById('mediaFile').addEventListener('change', updatePreview);
            document.getElementById('cardType').addEventListener('change', updatePreview);
        });
    </script>
</body>
</html>
