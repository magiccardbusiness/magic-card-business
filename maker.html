<script>
    // Supabase configuration - USE YOUR CREDENTIALS
    const SUPABASE_URL = 'https://elmhkhvryjzljxskbfps.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsbWhraHZyeWp6bGp4c2tiZnBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0NDc3NjMsImV4cCI6MjA4NDAyMzc2M30.Orrh2Pejnt3KPJMTUTmRRkhCwtZVfjUreKvX546bOcw';
    
    // Global supabase instance
    let supabase = null;
    
    // DOM Elements
    const cardIdInput = document.getElementById('cardId');
    const contentTypeRadios = document.querySelectorAll('input[name="contentType"]');
    const messageInput = document.getElementById('message');
    const generateBtn = document.getElementById('generateBtn');
    const saveBtn = document.getElementById('saveBtn');
    const testBtn = document.getElementById('testBtn');
    const cardPreview = document.getElementById('cardPreview');
    const cardsTableBody = document.getElementById('cardsTableBody');
    const notification = document.getElementById('notification');
    const syncStatus = document.getElementById('syncStatus');
    
    // Initialize Supabase
    function initSupabase() {
        try {
            // Check if supabase is loaded
            if (typeof supabase === 'function' || (window.supabase && window.supabase.createClient)) {
                // Use global supabase if available
                if (typeof supabase === 'function') {
                    // This is if you imported as ES6 module
                    supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                } else {
                    // This is if you loaded via CDN
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                }
                console.log('Supabase initialized:', supabase);
                return true;
            } else {
                console.error('Supabase library not loaded');
                return false;
            }
        } catch (error) {
            console.error('Error initializing Supabase:', error);
            return false;
        }
    }
    
    // Show notification
    function showNotification(message, type = 'success') {
        notification.textContent = message;
        notification.className = `notification ${type}`;
        notification.classList.add('show');
        
        setTimeout(() => {
            notification.classList.remove('show');
        }, 3000);
    }
    
    // Update sync status
    function updateSyncStatus(connected) {
        if (connected) {
            syncStatus.className = 'sync-status online';
            syncStatus.innerHTML = '<i class="fas fa-cloud"></i><span>Connected to Cloud</span>';
        } else {
            syncStatus.className = 'sync-status offline';
            syncStatus.innerHTML = '<i class="fas fa-cloud-slash"></i><span>Offline Mode</span>';
        }
    }
    
    // Generate card preview
    function generatePreview() {
        const cardId = cardIdInput.value.trim();
        const contentType = document.querySelector('input[name="contentType"]:checked').value;
        const message = messageInput.value.trim();
        
        // Validate card ID
        if (!cardId) {
            showNotification('Please enter a card ID', 'error');
            return null;
        }
        
        if (!/^\d+$/.test(cardId)) {
            showNotification('Card ID must contain only numbers', 'error');
            return null;
        }
        
        const fullCardId = `CARD${cardId}`;
        
        // Generate preview based on content type
        let previewHTML = '';
        let typeDisplay = '';
        
        switch(contentType) {
            case 'text':
                previewHTML = `
                    <div class="card-id-display">${fullCardId}</div>
                    <div class="text-content">${message || 'Your text message will appear here'}</div>
                `;
                typeDisplay = 'Text Message';
                break;
                
            case 'image':
                previewHTML = `
                    <div class="card-id-display">${fullCardId}</div>
                    <div style="font-size: 3rem; margin: 20px 0;">
                        <i class="fas fa-image"></i>
                    </div>
                    <div class="text-content">Image Card</div>
                    <p style="color: #666; margin-top: 10px;">${message || 'Image description'}</p>
                `;
                typeDisplay = 'Image';
                break;
                
            case 'video':
                previewHTML = `
                    <div class="card-id-display">${fullCardId}</div>
                    <div style="font-size: 3rem; margin: 20px 0;">
                        <i class="fas fa-video"></i>
                    </div>
                    <div class="text-content">Video Card</div>
                    <p style="color: #666; margin-top: 10px;">${message || 'Video description'}</p>
                `;
                typeDisplay = 'Video';
                break;
                
            case 'audio':
                previewHTML = `
                    <div class="card-id-display">${fullCardId}</div>
                    <div style="font-size: 3rem; margin: 20px 0;">
                        <i class="fas fa-music"></i>
                    </div>
                    <div class="text-content">Audio Card</div>
                    <p style="color: #666; margin-top: 10px;">${message || 'Audio description'}</p>
                `;
                typeDisplay = 'Audio';
                break;
        }
        
        previewHTML += `<div class="content-type-display">${typeDisplay}</div>`;
        
        // Update the preview
        cardPreview.innerHTML = previewHTML;
        
        // Return card data for saving
        return {
            card_id: fullCardId,
            message_type: contentType,
            message_text: message,
            preview: message.substring(0, 30) + (message.length > 30 ? '...' : ''),
            status: 'active'
        };
    }
    
    // Save card to Supabase
    async function saveCardToSupabase(cardData) {
        try {
            if (!supabase || typeof supabase.from !== 'function') {
                throw new Error('Supabase client not properly initialized. Check console for errors.');
            }
            
            // Convert message_type to proper format
            let messageTypeDisplay = 'Text Message';
            switch(cardData.message_type) {
                case 'image': messageTypeDisplay = 'Image'; break;
                case 'video': messageTypeDisplay = 'Video'; break;
                case 'audio': messageTypeDisplay = 'Audio'; break;
            }
            
            // First check if cards table exists by trying to fetch
            try {
                const { error: testError } = await supabase
                    .from('cards')
                    .select('*')
                    .limit(1);
                    
                if (testError && testError.message.includes('relation "cards" does not exist')) {
                    // Table doesn't exist, create it first
                    showNotification('Creating cards table... This might take a moment.', 'info');
                    
                    // We'll create the card locally for now
                    localStorage.setItem(`card_${cardData.card_id}`, JSON.stringify({
                        ...cardData,
                        message_type: messageTypeDisplay,
                        created_at: new Date().toISOString()
                    }));
                    
                    return { 
                        success: true, 
                        action: 'created_locally',
                        note: 'Table not found, saved locally. Create table in Supabase first.' 
                    };
                }
            } catch (testErr) {
                console.warn('Table test error:', testErr);
            }
            
            // Try to save to Supabase
            const { data, error } = await supabase
                .from('cards')
                .insert([{
                    card_id: cardData.card_id,
                    message_type: messageTypeDisplay,
                    message_text: cardData.message_text,
                    preview: cardData.preview,
                    status: 'active',
                    created_at: new Date().toISOString()
                }])
                .select();
            
            if (error) {
                // If error, try update instead (card might already exist)
                const { error: updateError } = await supabase
                    .from('cards')
                    .update({
                        message_type: messageTypeDisplay,
                        message_text: cardData.message_text,
                        preview: cardData.preview,
                        updated_at: new Date().toISOString()
                    })
                    .eq('card_id', cardData.card_id);
                
                if (updateError) throw updateError;
                
                return { success: true, action: 'updated' };
            }
            
            return { success: true, action: 'created' };
            
        } catch (error) {
            console.error('Supabase error:', error);
            
            // Fallback: Save to localStorage
            try {
                localStorage.setItem(`card_${cardData.card_id}`, JSON.stringify({
                    ...cardData,
                    created_at: new Date().toISOString()
                }));
                
                return { 
                    success: true, 
                    action: 'created_locally',
                    note: 'Saved locally due to Supabase error: ' + error.message 
                };
            } catch (localError) {
                return { 
                    success: false, 
                    action: 'failed',
                    error: 'Both Supabase and local storage failed: ' + error.message 
                };
            }
        }
    }
    
    // Initialize the app
    async function initApp() {
        // Initialize Supabase
        const supabaseInitialized = initSupabase();
        
        if (supabaseInitialized) {
            updateSyncStatus(true);
            showNotification('Connected to Supabase', 'success');
            
            // Test connection
            try {
                // Simple test query
                const { data, error } = await supabase
                    .from('cards')
                    .select('card_id')
                    .limit(1);
                
                if (error && error.message.includes('does not exist')) {
                    showNotification('Cards table not found. Creating card locally.', 'info');
                } else if (error) {
                    console.warn('Supabase test warning:', error);
                } else {
                    console.log('Supabase connection successful');
                }
            } catch (error) {
                console.warn('Connection test failed, using local fallback:', error);
            }
        } else {
            updateSyncStatus(false);
            showNotification('Running in offline mode', 'info');
        }
        
        // Generate initial preview
        generatePreview();
        
        // Set up event listeners
        generateBtn.addEventListener('click', function() {
            const cardData = generatePreview();
            if (cardData) {
                showNotification(`Card ${cardData.card_id} generated successfully!`, 'success');
            }
        });
        
        saveBtn.addEventListener('click', async function() {
            const cardData = generatePreview();
            if (cardData) {
                // Disable button and show loading
                const originalText = saveBtn.innerHTML;
                saveBtn.innerHTML = '<div class="loading"></div> Saving...';
                saveBtn.disabled = true;
                
                const result = await saveCardToSupabase(cardData);
                
                // Reset button
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
                
                if (result.success) {
                    const message = `Card ${cardData.card_id} ${result.action} successfully!`;
                    showNotification(result.note ? `${message} (${result.note})` : message, 'success');
                } else {
                    showNotification(`Failed to save: ${result.error}`, 'error');
                }
            }
        });
        
        testBtn.addEventListener('click', function() {
            const cardData = generatePreview();
            if (cardData) {
                showNotification(`Testing card ${cardData.card_id} in AR mode...`, 'success');
                
                setTimeout(() => {
                    alert(`AR Mode Activated!\n\nCard: ${cardData.card_id}\nContent: ${cardData.message_text}\n\nPoint your device's camera at the card to see the AR experience.`);
                }, 500);
            }
        });
        
        // Update type option styling when selected
        contentTypeRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.type-option').forEach(option => {
                    option.classList.remove('active');
                });
                this.parentElement.classList.add('active');
                
                // Update preview when type changes
                generatePreview();
            });
        });
        
        // Update preview when message changes
        messageInput.addEventListener('input', generatePreview);
        
        // Update preview when card ID changes
        cardIdInput.addEventListener('input', generatePreview);
        
        // Set up type option click handlers
        document.querySelectorAll('.type-option').forEach(option => {
            option.addEventListener('click', function() {
                const radio = this.querySelector('input');
                radio.checked = true;
                
                document.querySelectorAll('.type-option').forEach(opt => {
                    opt.classList.remove('active');
                });
                this.classList.add('active');
                
                generatePreview();
            });
        });
    }
    
    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', initApp);
</script>
