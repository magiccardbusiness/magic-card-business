<!DOCTYPE html>
<html>
<body style="text-align:center;padding:50px;font-family:Arial;">
    <h1>🎴 SUPER SIMPLE QR MAKER</h1>
    
    <input type="text" id="cardId" value="TEST123" style="padding:10px;font-size:16px;">
    <button onclick="makeQR()" style="padding:10px 20px;font-size:16px;">MAKE QR</button>
    
    <div id="result" style="margin-top:20px;"></div>
    
    <script>
        function makeQR() {
            const cardId = document.getElementById('cardId').value;
            const url = `https://magic-card-business.vercel.app/view.html?card=${cardId}`;
            
            // Use Google's QR code API - ALWAYS WORKS!
            const qrUrl = `https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=${encodeURIComponent(url)}`;
            
            document.getElementById('result').innerHTML = `
                <h3>Card: ${cardId}</h3>
                <img src="${qrUrl}" alt="QR Code"><br>
                <p>URL: ${url}</p>
                <button onclick="window.open('${url}', '_blank')">TEST CARD</button>
                <button onclick="window.open('https://magic-card-business.vercel.app/index.html?card=${cardId}', '_blank')">VIEW IN AR</button>
            `;
        }
        
        // Auto-make on load
        window.onload = makeQR;
    </script>
</body>
</html>
